<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="theme-color" content="#D85A30" />
<link rel="manifest" href="/health/manifest.json" />
<link rel="apple-touch-icon" href="/health/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Noti" />

<title>Noti</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{min-height:100%;overflow-x:hidden}
body{font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;
  min-height:100dvh;overflow-x:hidden;position:relative;
  color:var(--ink);
  background:var(--bg);
  background-attachment:fixed;
  transition:background .6s ease;
  width:100%;
}
:root{
  --ink:#4A1B0C; --muted:#712B13; --accent:#993C1D; --cta:#4A1B0C; --cta-text:#FFE4D0;
  --bg:linear-gradient(160deg,#FFE8C7 0%,#FFCBA4 25%,#F5A887 55%,#EC7E5C 85%,#D85A30 100%);
  --blob1:radial-gradient(circle at 30% 30%,#FFF0D8,#FFCBA4);
  --blob2:radial-gradient(circle at 30% 30%,#FBC9B4,#EC7E5C);
  --card-bg:rgba(255,255,255,.6); --card-border:rgba(255,255,255,.85);
  --mini-bg:rgba(255,255,255,.5); --mini-border:rgba(255,255,255,.7);
}
.t-midday{
  --ink:#412402; --muted:#5C3A10; --accent:#BA7517; --cta:#412402; --cta-text:#FFF8E7;
  --bg:linear-gradient(160deg,#FFF8E7 0%,#FFE8B8 30%,#FFD28A 60%,#FFB870 100%);
  --blob1:radial-gradient(circle at 30% 30%,#FFFBEF,#FFE8B8);
  --blob2:radial-gradient(circle at 30% 30%,#FFF1D0,#FFD28A);
}
.t-evening{
  --ink:#2C1530; --muted:#4D2650; --accent:#6B3B7A; --cta:#2C1530; --cta-text:#FFE4D0;
  --bg:linear-gradient(160deg,#FFC9B0 0%,#F09980 25%,#D96F7D 55%,#A8527E 85%,#6B3B7A 100%);
  --blob1:radial-gradient(circle at 30% 30%,#FFDCC8,#F09980);
  --blob2:radial-gradient(circle at 30% 30%,#E09098,#A8527E);
}
.t-night{
  --ink:#F0EAFF; --muted:#D8CDF5; --accent:#B8A8E0; --cta:#F0EAFF; --cta-text:#2E2457;
  --bg:linear-gradient(160deg,#3B2960 0%,#2E2457 25%,#1F2050 55%,#131A42 85%,#0A1230 100%);
  --blob1:radial-gradient(circle at 30% 30%,#5A4A8A,#2E2457);
  --blob2:radial-gradient(circle at 30% 30%,#3B4480,#131A42);
  --card-bg:rgba(255,255,255,.12); --card-border:rgba(255,255,255,.25);
  --mini-bg:rgba(255,255,255,.1); --mini-border:rgba(255,255,255,.18);
}
.blob{position:absolute;border-radius:50%;pointer-events:none;z-index:0}
.b1{top:-60px;right:-90px;width:260px;height:260px;background:var(--blob1);opacity:.85}
.b2{top:380px;left:-120px;width:280px;height:280px;background:var(--blob2);opacity:.6}
.wrap{position:relative;z-index:2;padding:24px 22px 110px;max-width:480px;margin:0 auto}

.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:40px}
.icon-btn{
  width:44px;height:44px;border-radius:16px;
  background:rgba(255,255,255,.45);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  border:.5px solid rgba(255,255,255,.6);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.t-night .icon-btn{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.25)}
.icon-btn svg{stroke:var(--ink)}
.bell-dot{position:absolute;width:8px;height:8px;border-radius:50%;background:#FFF5EF;border:2px solid #D85A30;transform:translate(10px,-8px)}

.date{font-size:14px;color:var(--ink);opacity:.75;font-weight:500;margin-bottom:8px}
.hello{font-size:36px;font-weight:500;color:var(--ink);line-height:1.1;letter-spacing:-.5px;margin-bottom:36px}

.cta-card{
  background:var(--card-bg);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);
  border-radius:28px;padding:22px;border:.5px solid var(--card-border);
}
.cta-label{font-size:11px;font-weight:500;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:10px;display:flex;justify-content:space-between}
.cta-time{font-size:12px;color:var(--muted);text-transform:none;letter-spacing:normal;font-weight:400}
.cta-title{font-size:22px;font-weight:500;color:var(--ink);line-height:1.3;margin-bottom:6px}
.cta-sub{font-size:14px;color:var(--muted);line-height:1.5;margin-bottom:20px}
.btn{
  width:100%;background:var(--cta);color:var(--cta-text);border:0;padding:14px;
  border-radius:16px;font-size:15px;font-weight:500;cursor:pointer;font-family:inherit;
  transition:opacity .15s;
}
.btn:active{opacity:.85}
.btn:disabled{opacity:.5}
.btn.secondary{background:transparent;border:.5px solid var(--card-border);color:var(--ink)}

.skip{font-size:13px;color:var(--ink);opacity:.7;margin-top:16px;text-align:center}
.skip a{text-decoration:underline;cursor:pointer}

.section-label{font-size:12px;font-weight:500;color:var(--ink);opacity:.75;letter-spacing:1.5px;text-transform:uppercase;margin:36px 0 14px}
.mirror{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.mini{
  background:var(--mini-bg);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);
  border-radius:20px;padding:16px;border:.5px solid var(--mini-border);
}
.mini-label{font-size:12px;color:var(--accent);margin-bottom:6px}
.mini-value{font-size:22px;font-weight:500;color:var(--ink);margin:0}
.mini-unit{font-size:13px;color:var(--muted);font-weight:400}
.mini-note{font-size:11px;color:var(--muted);margin-top:10px;line-height:1.4}
.bars{margin-top:10px;display:flex;gap:3px;align-items:flex-end;height:22px}
.bar{flex:1;border-radius:2px;background:var(--accent);opacity:.35}

.nav{
  position:fixed;bottom:16px;left:16px;right:16px;max-width:448px;margin:0 auto;
  background:rgba(255,255,255,.85);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);
  border-radius:24px;padding:12px 20px;
  display:flex;justify-content:space-around;align-items:center;z-index:10;
  border:.5px solid rgba(255,255,255,.9);
}
.t-night .nav{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.25)}
.nav-item{width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:14px;transition:background .15s}
.nav-item svg{stroke:var(--accent);opacity:.7}
.nav-item.active{background:var(--cta)}
.nav-item.active svg{stroke:var(--cta-text);opacity:1}

.loading{opacity:.5}
.hidden{display:none}

/* ── Push install/enable banner ─────────── */
.push-banner{
  margin:28px 0 0;
  background:var(--card-bg);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);
  border-radius:20px;border:.5px solid var(--card-border);overflow:hidden;
}
.push-banner-inner{padding:18px 20px}
.push-banner-label{font-size:10px;font-weight:500;color:var(--accent);letter-spacing:1.5px;margin:0 0 6px}
.push-banner-title{font-size:16px;font-weight:500;color:var(--ink);margin:0 0 6px;line-height:1.35}
.push-banner-body{font-size:13px;color:var(--muted);line-height:1.5;margin:0 0 14px}
.push-banner-actions{display:flex;gap:8px}
.push-btn{flex:1;background:var(--cta);color:var(--cta-text);border:0;padding:11px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit}
.push-btn:active{opacity:.85}
.push-btn-ghost{flex:0 0 auto;background:transparent;color:var(--ink);border:.5px solid var(--card-border);padding:11px 16px;border-radius:12px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;opacity:.75}
.push-banner.success{border-color:rgba(34,139,34,.3)}
.push-banner.success .push-banner-label{color:#1F7A3E}

/* ── Quick Log card — collapsed pill by default, expands when triggered ─── */
.qlog-card{
  margin-top:14px;
  border-radius:18px;
  overflow:hidden;
  border:.5px solid rgba(74,27,12,.14);
  background:rgba(255,255,255,.65);
  backdrop-filter:blur(8px);
  transition:background .2s;
}
/* Evening + night need MORE solid background for legibility over the darker gradients */
.t-evening .qlog-card{background:rgba(255,249,245,.92);border-color:rgba(61,40,24,.14)}
.t-night .qlog-card{background:rgba(255,249,245,.95);border-color:rgba(61,40,24,.14)}

/* Trigger pill — visible by default, hidden when card is open */
.qlog-trigger{
  width:100%;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 18px;background:transparent;border:0;font-family:inherit;cursor:pointer;
  color:var(--ink);
}
.qlog-card.open .qlog-trigger{display:none}
.qlog-trigger-left{display:flex;align-items:center;gap:10px}
.qlog-trigger-dot{
  width:8px;height:8px;border-radius:50%;background:var(--accent);
  flex-shrink:0;
}
.qlog-trigger-label{font-size:14px;font-weight:500;color:var(--ink)}
.qlog-trigger-hint{font-size:12px;color:var(--muted);font-style:italic}

/* Body — hidden until card is open */
.qlog-body{display:none;padding:4px 18px 18px}
.qlog-card.open .qlog-body{display:block}

.qlog-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px}
.qlog-opt{
  padding:12px 4px;border-radius:12px;font-size:13px;font-weight:500;
  background:rgba(255,255,255,.7);color:var(--ink);border:.5px solid rgba(74,27,12,.15);
  cursor:pointer;transition:all .15s;font-family:inherit;
}
.qlog-opt:active{transform:scale(.98)}
.qlog-opt.selected{background:var(--cta);color:var(--cta-text);border-color:var(--cta)}
.qlog-text{
  width:100%;min-height:60px;resize:vertical;
  background:rgba(255,255,255,.7);color:var(--ink);border:.5px solid rgba(74,27,12,.15);
  border-radius:12px;padding:11px 12px;font-size:13.5px;font-family:inherit;
  margin-bottom:10px;outline:none;line-height:1.5;
}
.qlog-text::placeholder{color:var(--muted);opacity:.75}
.qlog-reply{
  padding:13px 14px;border-radius:12px;background:rgba(255,255,255,.7);
  border:.5px solid rgba(74,27,12,.15);font-size:13.5px;line-height:1.5;
  color:var(--ink);margin-top:8px;
}
.qlog-reply-label{font-size:10px;font-weight:500;color:var(--accent);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}

/* ── Unread dot on Alys nav item ─────────── */
.nav-item{position:relative}
.nav-dot{
  position:absolute;top:8px;right:8px;
  width:8px;height:8px;border-radius:50%;background:#E9533E;
  border:2px solid rgba(255,255,255,.95);
  display:none;
}
.t-night .nav-dot{border-color:rgba(255,255,255,.2)}
.nav-item.has-unread .nav-dot{display:block}
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="blob b2"></div>

<div class="wrap">
  <div class="topbar">
    <div class="icon-btn" id="btn-record">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
    </div>
    <div class="icon-btn" id="btn-profile">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
    </div>
  </div>

  <p class="date" id="date">Loading…</p>
  <h1 class="hello" id="hello">Hi</h1>

  <div class="cta-card">
    <div class="cta-label">
      <span id="cta-tag">Check-in</span>
      <span class="cta-time" id="cta-time">~2 min</span>
    </div>
    <p class="cta-title" id="cta-title">Ready when you are</p>
    <p class="cta-sub" id="cta-sub">A few quick things so I can see how today is going.</p>

  <p class="skip hidden" id="skip"><a id="skip-link">Not today? Skip — I'll catch you later.</a></p>

      <button class="btn" id="qlog-submit" disabled>Pick how you're feeling</button>

  <p class="section-label">Your week so far</p>

    <div class="mini"><p class="mini-label">Mornings</p><p class="mini-value" id="m-morning">—</p></div>

  <!-- Push install / enable banner (shown conditionally by push-client status) -->
  <div class="push-banner hidden" id="push-banner">
    <div class="push-banner-inner">
      <p class="push-banner-label" id="push-label">REMINDERS</p>
      <p class="push-banner-title" id="push-title">Get check-ins on this device</p>
      <p class="push-banner-body" id="push-body">I'll reach you here instead of SMS. You can turn it off anytime.</p>
      <div class="push-banner-actions">
        <button class="push-btn" id="push-action">Turn on reminders</button>
        <button class="push-btn-ghost" id="push-dismiss">Not now</button>

</div>

<div class="nav">
  <div class="nav-item active">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
  </div>
  <div class="nav-item" id="nav-alys" onclick="location.href='/health/alys'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    <span class="nav-dot"></span>
  </div>
  <div class="nav-item" onclick="location.href='/health/record'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
  </div>

    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
  </div>

<script>
const API = 'https://noti-health-api.ancient-bread-01fe.workers.dev';
const token = localStorage.getItem('noti_token');
const user = JSON.parse(localStorage.getItem('noti_user') || 'null');

if (!token || !user) { location.href = '/health/login'; }

// ── Time-of-day theming ──────────────────────────────────
function timeOfDay() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const current = h * 60 + m;  // minutes since midnight

  // Anchor transitions to the user's actual check-in schedule where sensible.
  // Morning window: from 5am until 1h after their morning time (so late risers still see "morning")
  // Evening window: from 3pm until 1h after their evening time (so late check-ins still look like "evening")
  const parseHm = (hm) => {
    if (!hm) return null;
    const [hh, mm] = hm.split(':').map(Number);
    return hh * 60 + (mm || 0);
  };
  const morningMins = parseHm((user.morningTime || '07:30').slice(0,5));
  const eveningMins = parseHm((user.eveningTime || '20:30').slice(0,5));

  if (current >= 5 * 60 && current < (morningMins + 60))        return 'sunrise';
  if (current >= (morningMins + 60) && current < 15 * 60)       return 'midday';
  if (current >= 15 * 60 && current < (eveningMins + 60))       return 'evening';
  return 'night';
}
const tod = timeOfDay();
if (tod !== 'sunrise') document.body.classList.add('t-' + tod);

// ── Greeting ─────────────────────────────────────────────
const name = (user.name || '').split(' ')[0];
const greetings = {
  sunrise: `Good morning,\n${name}`,
  midday:  `Good afternoon,\n${name}`,
  evening: `Good evening,\n${name}`,
  night:   `Rest well,\n${name}`
};
document.getElementById('hello').innerHTML = greetings[tod].replace('\n','<br>');

const now = new Date();
document.getElementById('date').textContent =
  now.toLocaleDateString('en-AU', { weekday: 'long', day: 'numeric', month: 'long' });

// ── CTA — what's the primary action right now? ──────────
async function setupCTA() {
  const btn = document.getElementById('cta-btn');
  const tag = document.getElementById('cta-tag');
  const title = document.getElementById('cta-title');
  const sub = document.getElementById('cta-sub');
  const time = document.getElementById('cta-time');
  const skip = document.getElementById('skip');

  // Midday: no required check-in, just a soft presence. Quick Log is always available below.
  if (tod === 'midday') {
    tag.textContent = 'Mid-day';
    title.textContent = 'No check-in right now';
    sub.textContent = "Morning's done. Evening comes later. If anything's on your mind, use Quick log.";
    time.textContent = '';
    btn.textContent = 'View today';
    btn.disabled = false;
    btn.onclick = () => location.href = '/health/record';
    return;
  }

  // Night: check-ins assumed done
  if (tod === 'night') {
    tag.textContent = 'Today, logged';
    title.textContent = 'See you in the morning';
    sub.textContent = "Rest if you can — I'll check in tomorrow.";
    time.textContent = '';
    btn.textContent = "View today's record";
    btn.disabled = false;
    btn.onclick = () => location.href = '/health/record';
    return;
  }

  // Morning or evening: offer the check-in
  const isMorning = tod === 'sunrise';
  if (isMorning) {
    tag.textContent = 'Morning check-in';
    title.textContent = 'Ready when you are';
    sub.textContent = 'A few quick things before the day gets going.';
    time.textContent = '~2 min';
    btn.textContent = 'Start check-in';
  } else {
    tag.textContent = 'Evening check-in';
    title.textContent = 'How did today go?';
    sub.textContent = 'Take your time. Skip anything.';
    time.textContent = '~5 min';
    btn.textContent = 'Start reflection';
  }
  btn.disabled = false;
  btn.onclick = startCheckin;
  skip.classList.remove('hidden');
}

async function startCheckin() {
  // In the full product, this would hit an endpoint that returns a session ID,
  // or read the session from a scheduled-check-in SMS link. For now:
  // - If the user arrived via an SMS link, they'd land on /checkin directly
  // - From here we ask the backend for an ad-hoc session
  const btn = document.getElementById('cta-btn');
  btn.disabled = true; btn.textContent = 'Opening…';
  try {
    const res = await fetch(API + '/me/start-checkin', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ slot: tod === 'sunrise' ? 'morning' : 'evening' })
    });
    const data = await res.json();
    if (data.sessionId) {
      location.href = '/health/checkin/' + data.sessionId;
    } else {
      // Fallback: route to the checkin page without a session;
      // it will show a "no active session" state.
      location.href = '/health/checkin';
    }
  } catch (e) {
    btn.textContent = 'Start check-in';
    btn.disabled = false;
  }
}

// ── Mirror — last week's stats, dynamic per user templates ──
// Core stats shown to everyone
const CORE_MIRROR = [
  { label: 'Sleep',  get: (a) => a.sleep != null ? a.sleep.toFixed(1) + '<span class="mini-unit"> hrs avg</span>' : null },
  { label: 'Mood',   get: (a) => a.mood  != null ? a.mood.toFixed(1)  + '<span class="mini-unit"> / 10</span>' : null }
];

// Template-specific stats — only shown if user tracks that template
const TEMPLATE_MIRROR = {
  anxiety:  { label: 'Anxiety',    get: (a) => a.anxiety  != null ? a.anxiety.toFixed(1)  + '<span class="mini-unit"> / 10</span>' : null },
  fatigue:  { label: 'Fatigue',    get: (a) => a.fatigue  != null ? a.fatigue.toFixed(1)  + '<span class="mini-unit"> / 10</span>' : null },
  fog:      { label: 'Brain fog',  get: (a) => a.fog      != null ? a.fog.toFixed(1)      + '<span class="mini-unit"> / 10</span>' : null },
  pain:     { label: 'Pain',       get: (a) => a.pain     != null ? a.pain.toFixed(1)     + '<span class="mini-unit"> / 10</span>' : null },
  weight:   { label: 'Weight',     get: (a) => a.weight   != null ? a.weight.toFixed(1)   + '<span class="mini-unit"> kg</span>' : null },
  migraines:{ label: 'Headache',   get: (a) => a.headache != null ? a.headache.toFixed(1) + '<span class="mini-unit"> / 10</span>' : null },
  pots:     { label: 'Heart rate', get: (a) => a.heart_rate != null ? Math.round(a.heart_rate) + '<span class="mini-unit"> bpm avg</span>' : null }
};

async function loadMirror() {
  try {
    const [meRes, patternsRes] = await Promise.all([
      fetch(API + '/me',                   { headers: { 'Authorization': 'Bearer ' + token }}),
      fetch(API + '/me/patterns?days=7',   { headers: { 'Authorization': 'Bearer ' + token }})
    ]);
    const me       = await meRes.json();
    const data     = await patternsRes.json();
    const avgs     = (data.patterns && data.patterns.averages) || {};
    const templates = me.templates || [];

    // Build the list of stats to show
    const picks = [];
    for (const stat of CORE_MIRROR) {
      const v = stat.get(avgs);
      if (v != null) picks.push({ label: stat.label, value: v });
    }
    for (const t of templates) {
      if (TEMPLATE_MIRROR[t]) {
        const v = TEMPLATE_MIRROR[t].get(avgs);
        if (v != null) picks.push({ label: TEMPLATE_MIRROR[t].label, value: v });
      }
    }
    // Cap at 4 (2x2 grid looks best on mobile) and need at least 1 to render
    const capped = picks.slice(0, 4);
    const mirror = document.getElementById('mirror');
    if (capped.length === 0) {
      mirror.innerHTML = `<div class="mini" style="grid-column:span 2"><p class="mini-label">Your week</p><p class="mini-value" style="font-size:14px;opacity:.7">Do a couple more check-ins and patterns will start showing here.</p></div>`;
    } else {
      mirror.innerHTML = capped.map(s =>
        `<div class="mini"><p class="mini-label">${s.label}</p><p class="mini-value">${s.value}</p></div>`
      ).join('');
    }
  } catch (e) {
    // quietly ignore; the mirror is decorative
  }
}

// ── Quick Log — collapsed by default, trigger opens it. Submits via POST /me/note ─
let qlogMood = null;

function qlogReset() {
  // Clear selection + text + reply, enable everything, re-show the submit button
  qlogMood = null;
  document.querySelectorAll('.qlog-opt').forEach(o => {
    o.classList.remove('selected');
    o.disabled = false;
  });
  const textEl = document.getElementById('qlog-text');
  textEl.value = '';
  textEl.disabled = false;
  const submit = document.getElementById('qlog-submit');
  submit.style.display = '';
  submit.disabled = true;
  submit.textContent = "Pick how you're feeling";
  document.getElementById('qlog-reply').classList.add('hidden');
  document.getElementById('qlog-reply-body').textContent = '';
}

function qlogCollapse() {
  document.getElementById('qlog-card').classList.remove('open');
  qlogReset();
}

document.getElementById('qlog-trigger').onclick = () => {
  qlogReset();
  document.getElementById('qlog-card').classList.add('open');
  // Focus first mood option for keyboard users
  setTimeout(() => document.querySelector('.qlog-opt')?.focus(), 100);
};

document.querySelectorAll('.qlog-opt').forEach(opt => {
  opt.onclick = () => {
    if (opt.disabled) return;
    document.querySelectorAll('.qlog-opt').forEach(o => o.classList.remove('selected'));
    opt.classList.add('selected');
    qlogMood = opt.dataset.mood;
    const submit = document.getElementById('qlog-submit');
    submit.disabled = false;
    submit.textContent = 'Send';
  };
});

document.getElementById('qlog-submit').onclick = async () => {
  if (!qlogMood) return;
  const submit = document.getElementById('qlog-submit');
  const text   = document.getElementById('qlog-text').value.trim();
  submit.disabled = true;
  submit.textContent = 'Sending…';
  try {
    const res = await fetch(API + '/me/note', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ mood: qlogMood, body: text })
    });
    const data = await res.json();
    if (data.success && data.note && data.note.alys_reply) {
      // Show Alys's reply briefly, lock inputs, then auto-collapse + reset after 3.5s
      document.querySelectorAll('.qlog-opt').forEach(o => o.disabled = true);
      document.getElementById('qlog-text').disabled = true;
      submit.style.display = 'none';
      document.getElementById('qlog-reply-body').textContent = data.note.alys_reply;
      document.getElementById('qlog-reply').classList.remove('hidden');
      setTimeout(qlogCollapse, 3500);
    } else {
      submit.textContent = 'Try again';
      submit.disabled = false;
    }
  } catch (e) {
    submit.textContent = 'Try again';
    submit.disabled = false;
  }
};

// ── Unread indicator on Alys nav icon ────────────────────
async function checkUnread() {
  try {
    const res = await fetch(API + '/me/unread-count', {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    const data = await res.json();
    const navAlys = document.getElementById('nav-alys');
    if (data.unread > 0) {
      navAlys.classList.add('has-unread');
    } else {
      navAlys.classList.remove('has-unread');
    }
  } catch (e) { /* silent */ }
}

setupCTA();
loadMirror();
checkUnread();

// ── Push banner ─────────────────────────────────────────
// Shows up to 14 days after first sign-in to nudge users into push.
// Dismissed in localStorage so it doesn't nag.
async function setupPushBanner() {
  if (!window.NotiPush) return;
  if (localStorage.getItem('noti_push_dismissed') === '1') return;

  const banner    = document.getElementById('push-banner');
  const titleEl   = document.getElementById('push-title');
  const bodyEl    = document.getElementById('push-body');
  const labelEl   = document.getElementById('push-label');
  const actionBtn = document.getElementById('push-action');
  const dismissBtn= document.getElementById('push-dismiss');

  const status = await window.NotiPush.status();

  if (status === 'enabled')      return;                    // already on — hide
  if (status === 'unsupported')  return;                    // browser doesn't support — hide
  if (status === 'denied')       return;                    // user said no at OS level — don't re-nag

  banner.classList.remove('hidden');

  if (status === 'needs_install') {
    // iOS Safari in-browser — user must Add to Home Screen first
    labelEl.textContent = 'ON YOUR IPHONE';
    titleEl.textContent = 'Add Noti to your home screen';
    bodyEl.textContent  = 'Tap the Share icon, then "Add to Home Screen". Then come back and turn on reminders.';
    actionBtn.textContent = 'Show me how';
    actionBtn.onclick = () => {
      alert('1. Tap the Share button (the square with arrow) in Safari\n2. Scroll down → "Add to Home Screen"\n3. Tap Add\n4. Open the new Noti icon from your home screen');
    };
  } else if (status === 'needs_permission') {
    labelEl.textContent = 'REMINDERS';
    titleEl.textContent = 'Get check-ins on this device';
    bodyEl.textContent  = "I'll reach you here instead of SMS. No marketing. No spam. Ever.";
    actionBtn.textContent = 'Turn on reminders';
    actionBtn.onclick = async () => {
      actionBtn.disabled = true; actionBtn.textContent = 'Turning on…';
      try {
        await window.NotiPush.subscribe();
        banner.classList.add('success');
        labelEl.textContent = "YOU'RE ALL SET";
        titleEl.textContent = 'Reminders are on';
        bodyEl.textContent  = "I'll reach out here when it's check-in time.";
        actionBtn.style.display = 'none';
        dismissBtn.textContent  = 'Great';
      } catch (e) {
        actionBtn.disabled = false;
        actionBtn.textContent = 'Turn on reminders';
        bodyEl.textContent = 'Could not turn on reminders: ' + e.message;
      }
    };
  }

  dismissBtn.onclick = () => {
    localStorage.setItem('noti_push_dismissed', '1');
    banner.classList.add('hidden');
  };
}

// Defer so NotiPush has time to initialise
setTimeout(setupPushBanner, 600);
</script>

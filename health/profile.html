<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="theme-color" content="#D85A30" />
<link rel="manifest" href="/health/manifest.json" />
<link rel="apple-touch-icon" href="/health/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Noti" />

<title>Noti · Profile</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
body{
  min-height:100dvh;overflow-x:hidden;position:relative;color:#4A1B0C;
  background:linear-gradient(160deg,#FFF5EF 0%,#F5E4D8 40%,#E8D4C2 100%);
}
.blob{position:absolute;border-radius:50%;pointer-events:none;z-index:0}
.b1{top:-50px;right:-70px;width:200px;height:200px;background:radial-gradient(circle at 30% 30%,#FFF5EF,#F5E4D8);opacity:.9}

.wrap{position:relative;z-index:2;padding:24px 22px 110px;max-width:480px;margin:0 auto}

.topbar{display:flex;align-items:center;margin-bottom:22px}
.back{width:40px;height:40px;border-radius:14px;background:rgba(255,255,255,.7);border:.5px solid rgba(74,27,12,.1);display:flex;align-items:center;justify-content:center;cursor:pointer}

.identity{display:flex;align-items:center;gap:14px;margin-bottom:32px}
.avatar-big{
  width:60px;height:60px;border-radius:50%;background:linear-gradient(135deg,#F09980,#6B3B7A);
  display:flex;align-items:center;justify-content:center;color:#FFE4D0;font-size:22px;font-weight:500;
}
.identity h1{font-size:20px;font-weight:500;color:#4A1B0C;margin:0}
.identity p{font-size:13px;color:#712B13;opacity:.75;margin:0}

.section-label{font-size:11px;font-weight:500;color:#993C1D;letter-spacing:1.5px;text-transform:uppercase;margin:0 0 10px}

.card{
  background:rgba(255,255,255,.75);border:.5px solid rgba(74,27,12,.1);
  border-radius:18px;padding:4px 16px;margin-bottom:20px;
}
.row{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 0;border-bottom:.5px solid rgba(74,27,12,.1);cursor:pointer;
}
.row:last-child{border-bottom:0}
.row-left h3{font-size:14px;color:#4A1B0C;font-weight:500;margin:0 0 2px}
.row-left p{font-size:12px;color:#712B13;opacity:.75;margin:0}
.row-right{font-size:15px;color:#4A1B0C;font-weight:500;font-variant-numeric:tabular-nums}
.time-input{
  background:transparent;border:0;font-family:inherit;font-size:15px;color:#4A1B0C;font-weight:500;
  text-align:right;outline:none;
}

.tag-row{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:20px}
.tag{background:rgba(255,255,255,.85);border:.5px solid rgba(74,27,12,.15);border-radius:12px;padding:6px 12px;font-size:12px;color:#4A1B0C;cursor:pointer}
.tag.active{background:#4A1B0C;color:#FFE4D0;border-color:#4A1B0C}

.push-toggle{
  background:#4A1B0C;color:#FFE4D0;border:0;padding:8px 14px;border-radius:10px;
  font-size:12px;font-weight:500;cursor:pointer;font-family:inherit;
}
.push-toggle.off{background:transparent;color:#993C1D;border:.5px solid rgba(153,60,29,.25)}
.push-toggle:disabled{opacity:.4;cursor:wait}

.signout{
  width:100%;background:transparent;color:#993C1D;border:.5px solid rgba(153,60,29,.25);
  padding:14px;border-radius:14px;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;margin-top:8px;
}

.nav{
  position:fixed;bottom:16px;left:16px;right:16px;max-width:448px;margin:0 auto;
  background:rgba(255,255,255,.85);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);
  border-radius:24px;padding:12px 20px;
  display:flex;justify-content:space-around;align-items:center;z-index:10;
  border:.5px solid rgba(74,27,12,.1);
}
.nav-item{width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:14px;transition:background .15s}
.nav-item svg{stroke:#993C1D;opacity:.7}
.nav-item.active{background:#4A1B0C}
.nav-item.active svg{stroke:#FFE4D0;opacity:1}

.saved{position:fixed;top:16px;left:50%;transform:translateX(-50%);background:#4A1B0C;color:#FFE4D0;padding:8px 16px;border-radius:12px;font-size:13px;opacity:0;transition:opacity .2s;z-index:20}
.saved.show{opacity:1}
</style>
</head>
<body>
<div class="blob b1"></div>
<div class="saved" id="saved">Saved</div>

<div class="wrap">
  <div class="topbar">
    <div class="back" onclick="location.href='/health/home'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4A1B0C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </div>
  </div>

  <div class="identity">
    <div class="avatar-big" id="initial">?</div>
    <div>
      <h1 id="name">—</h1>
      <p id="phone">—</p>
    </div>
  </div>

  <p class="section-label">Check-in times</p>
  <div class="card">
    <div class="row">
      <div class="row-left">
        <h3>Morning</h3>
        <p>Quick check, 4–6 questions</p>
      </div>
      <input class="time-input" type="time" id="morning-time" />
    </div>
    <div class="row">
      <div class="row-left">
        <h3>Evening</h3>
        <p>Reflection, up to 18</p>
      </div>
      <input class="time-input" type="time" id="evening-time" />
    </div>
  </div>

  <p class="section-label">What you track</p>
  <div class="tag-row" id="templates"></div>

  <p class="section-label">Reminders on this device</p>
  <div class="card" id="push-card">
    <div class="row" style="cursor:default">
      <div class="row-left">
        <h3 id="push-status-title">Checking…</h3>
        <p id="push-status-sub">&nbsp;</p>
      </div>
      <button class="push-toggle" id="push-toggle" style="display:none">Turn on</button>
    </div>
  </div>

  <p class="section-label">Account</p>
  <button class="signout" onclick="signout()">Sign out</button>
</div>

<div class="nav">
  <div class="nav-item" onclick="location.href='/health/home'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
  </div>
  <div class="nav-item" onclick="location.href='/health/alys'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
  </div>
  <div class="nav-item" onclick="location.href='/health/record'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
  </div>
  <div class="nav-item active">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
  </div>
</div>

<script>
const API = 'https://noti-health-api.ancient-bread-01fe.workers.dev';
const token = localStorage.getItem('noti_token');
const user = JSON.parse(localStorage.getItem('noti_user') || 'null');
if (!token || !user) location.href = '/health/login';

const ALL_TEMPLATES = [
  { key: 'mood',       label: 'Mood' },
  { key: 'health',     label: 'Health' },
  { key: 'migraines',  label: 'Migraines' },
  { key: 'pots',       label: 'POTS' },
  { key: 'depression', label: 'Depression' },
  { key: 'weight',     label: 'Weight' },
  { key: 'cycle',      label: 'Cycle' }
];

// Identity
document.getElementById('name').textContent = user.name || '—';
document.getElementById('phone').textContent = formatPhone(user.phone || '');
document.getElementById('initial').textContent = (user.name || '?').trim()[0].toUpperCase();
document.getElementById('morning-time').value = (user.morningTime || '').slice(0,5);
document.getElementById('evening-time').value = (user.eveningTime || '').slice(0,5);

async function loadTemplates() {
  try {
    const res = await fetch(API + '/me', { headers: { 'Authorization': 'Bearer ' + token }});
    const data = await res.json();
    const active = new Set(data.templates || []);
    const el = document.getElementById('templates');
    el.innerHTML = ALL_TEMPLATES.map(t =>
      `<span class="tag${active.has(t.key) ? ' active' : ''}" data-key="${t.key}">${t.label}</span>`
    ).join('');
    el.querySelectorAll('.tag').forEach(tag => {
      tag.onclick = () => {
        tag.classList.toggle('active');
        const enabled = [...el.querySelectorAll('.tag.active')].map(t => t.dataset.key);
        saveTemplates(enabled);
      };
    });
  } catch (e) {
    // Fallback: offer all as toggles anyway
    const el = document.getElementById('templates');
    el.innerHTML = ALL_TEMPLATES.map(t =>
      `<span class="tag" data-key="${t.key}">${t.label}</span>`
    ).join('');
  }
}

async function saveTemplates(enabled) {
  try {
    await fetch(API + '/me/templates', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({ enabled })
    });
    toast();
  } catch (e) { /* ignore */ }
}

['morning-time','evening-time'].forEach(id => {
  document.getElementById(id).addEventListener('change', saveTimes);
});

async function saveTimes() {
  try {
    await fetch(API + '/me/schedule', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        morningTime: document.getElementById('morning-time').value || null,
        eveningTime: document.getElementById('evening-time').value || null
      })
    });
    toast();
  } catch (e) { /* ignore */ }
}

function formatPhone(p) {
  // 61433461432 → +61 433 461 432
  if (!p) return '';
  const s = p.startsWith('61') ? '+' + p : p;
  return s.replace(/(\+61)(\d)(\d{3})(\d{3})(\d{3})/, '$1 $2$3 $4 $5');
}

function signout() {
  localStorage.removeItem('noti_token');
  localStorage.removeItem('noti_user');
  location.href = '/health/login';
}

function toast() {
  const t = document.getElementById('saved');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1200);
}

loadTemplates();

// ── Push notifications status + toggle ───────────────────
async function refreshPushStatus() {
  if (!window.NotiPush) return;
  const title  = document.getElementById('push-status-title');
  const sub    = document.getElementById('push-status-sub');
  const toggle = document.getElementById('push-toggle');

  const status = await window.NotiPush.status();

  if (status === 'unsupported') {
    title.textContent = 'Not supported here';
    sub.textContent = "This browser doesn't support push. You'll get SMS instead.";
    toggle.style.display = 'none';
    return;
  }
  if (status === 'needs_install') {
    title.textContent = 'Install Noti first';
    sub.textContent = 'On iPhone, tap Share → Add to Home Screen. Then open from the home screen.';
    toggle.style.display = 'none';
    return;
  }
  if (status === 'denied') {
    title.textContent = 'Blocked by your browser';
    sub.textContent = "You've blocked notifications. Re-enable in browser settings, then come back.";
    toggle.style.display = 'none';
    return;
  }
  if (status === 'enabled') {
    title.textContent = 'On';
    sub.textContent = "I'll reach you here. SMS only if push fails.";
    toggle.textContent = 'Turn off';
    toggle.className = 'push-toggle off';
    toggle.style.display = 'block';
    toggle.onclick = async () => {
      toggle.disabled = true;
      try { await window.NotiPush.unsubscribe(); } catch (e) {}
      toggle.disabled = false;
      refreshPushStatus();
    };
    return;
  }
  // needs_permission
  title.textContent = 'Off';
  sub.textContent = 'Turn on to get check-ins here instead of SMS.';
  toggle.textContent = 'Turn on';
  toggle.className = 'push-toggle';
  toggle.style.display = 'block';
  toggle.onclick = async () => {
    toggle.disabled = true;
    toggle.textContent = 'Turning on…';
    try { await window.NotiPush.subscribe(); }
    catch (e) { sub.textContent = 'Could not turn on: ' + e.message; }
    toggle.disabled = false;
    refreshPushStatus();
  };
}

setTimeout(refreshPushStatus, 600);
</script>
<script src="/health/push-client.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<meta name="theme-color" content="#D85A30" />
<link rel="manifest" href="/health/manifest.json" />
<link rel="apple-touch-icon" href="/health/icon-192.png" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Noti" />

<title>Noti · Your record</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{min-height:100%;}body{font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased}
body{
  min-height:100dvh;background-attachment:fixed;overflow-x:hidden;position:relative;color:#4A1B0C;
  background:linear-gradient(160deg,#FFF5EF 0%,#F5E4D8 40%,#E8D4C2 100%);
}
.blob{position:absolute;border-radius:50%;pointer-events:none;z-index:0}
.b1{top:-60px;right:-80px;width:200px;height:200px;background:radial-gradient(circle at 30% 30%,#FFF5EF,#F5E4D8);opacity:.9}

.wrap{position:relative;z-index:2;padding:24px 22px 110px;max-width:480px;margin:0 auto}

.topbar{display:flex;align-items:center;margin-bottom:22px}
.back{
  width:40px;height:40px;border-radius:14px;background:rgba(255,255,255,.7);
  border:.5px solid rgba(74,27,12,.1);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}

.pg-label{font-size:11px;font-weight:500;color:#993C1D;letter-spacing:1.5px;text-transform:uppercase;margin:0 0 4px}
h1{font-size:26px;font-weight:500;color:#4A1B0C;margin:0 0 22px;letter-spacing:-.3px}

.range-chips{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px}
.range-chip{
  background:rgba(255,255,255,.7);border:.5px solid rgba(74,27,12,.12);
  border-radius:12px;padding:10px 0;text-align:center;font-size:13px;color:#4A1B0C;font-weight:500;cursor:pointer;
}
.range-chip.active{background:#4A1B0C;color:#FFE4D0;border-color:#4A1B0C}

.export-btn{
  width:100%;background:#4A1B0C;color:#FFE4D0;border:0;padding:14px;border-radius:16px;
  font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;
  display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:20px;
}
.export-btn:active{opacity:.9}
.export-btn svg{stroke:#FFE4D0}

.card{
  background:rgba(255,255,255,.75);border:.5px solid rgba(74,27,12,.1);
  border-radius:18px;padding:16px;margin-bottom:12px;
}
.card-label{font-size:11px;font-weight:500;color:#993C1D;letter-spacing:1.2px;text-transform:uppercase;margin:0 0 12px}

.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.stat{}
.stat p:first-child{font-size:11px;color:#712B13;margin:0 0 2px}
.stat p:last-child{font-size:18px;font-weight:500;color:#4A1B0C;margin:0;font-variant-numeric:tabular-nums}

.pattern{font-size:13px;color:#4A1B0C;margin:0 0 8px;line-height:1.5;padding-left:14px;position:relative}
.pattern::before{content:'';position:absolute;left:0;top:8px;width:5px;height:5px;background:#993C1D;border-radius:50%}
.pattern:last-child{margin-bottom:0}

.log-link{font-size:13px;color:#712B13;margin:0;line-height:1.5}

.empty{color:#712B13;font-size:13px;line-height:1.5;margin:0}

.nav{
  position:fixed;bottom:16px;left:16px;right:16px;max-width:448px;margin:0 auto;
  background:rgba(255,255,255,.85);-webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);
  border-radius:24px;padding:12px 20px;
  display:flex;justify-content:space-around;align-items:center;z-index:10;
  border:.5px solid rgba(74,27,12,.1);
}
.nav-item{width:44px;height:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;border-radius:14px;transition:background .15s}
.nav-item svg{stroke:#993C1D;opacity:.7}
.nav-item.active{background:#4A1B0C}
.nav-item.active svg{stroke:#FFE4D0;opacity:1}

.nav-item{position:relative}
.nav-dot{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%;background:#E9533E;border:2px solid rgba(255,255,255,.95);display:none}
.nav-item.has-unread .nav-dot{display:block}
</style>
</head>
<body>
<div class="blob b1"></div>

<div class="wrap">
  <div class="topbar">
    <div class="back" onclick="location.href='/health/home'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4A1B0C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
    </div>
  </div>

  <p class="pg-label">Your record</p>
  <h1 id="title">Last 30 days</h1>

  <div class="range-chips">
    <div class="range-chip" data-days="7">7 days</div>
    <div class="range-chip active" data-days="30">30 days</div>
    <div class="range-chip" data-days="90">90 days</div>
  </div>

  <button class="export-btn" onclick="location.href='/health/export'">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
    Export PDF for specialist
  </button>

  <div class="card">
    <p class="card-label">Summary</p>
    <div class="stat-grid" id="summary-grid"></div>
  </div>

  <div class="card">
    <p class="card-label">Patterns Alys noticed</p>
    <div id="patterns-list"><p class="empty">Building up a picture. Check back after a few more check-ins.</p></div>
  </div>

  <div class="card">
    <div class="log-header" id="log-header" style="cursor:pointer;display:flex;justify-content:space-between;align-items:center;padding:4px 0">
      <p class="card-label" style="margin:0">Daily log</p>
      <span class="log-caret" id="log-caret" style="font-size:18px;color:#4A1B0C;opacity:.6;transition:transform .2s;display:inline-block">▸</span>
    </div>
    <p class="log-link" id="log-count">—</p>
    <div id="log-entries" class="hidden" style="margin-top:12px"></div>
  </div>
</div>

<style>
.log-entry{
  border-top:.5px solid rgba(74,27,12,.12); padding:14px 0;
}
.log-entry:last-child{ padding-bottom:4px }
.log-entry-header{
  display:flex; justify-content:space-between; align-items:center;
  cursor:pointer;
}
.log-entry-date{ font-size:14px; font-weight:500; color:#4A1B0C }
.log-entry-slot{ font-size:12px; color:#712B13; opacity:.75 }
.log-entry-caret{ font-size:14px; color:#4A1B0C; opacity:.5; transition:transform .2s }
.log-entry.open .log-entry-caret{ transform:rotate(90deg) }
.log-entry-body{ margin-top:10px; display:none }
.log-entry.open .log-entry-body{ display:block }
.log-answer{
  display:flex; justify-content:space-between; padding:6px 0;
  font-size:13px; border-bottom:.5px dashed rgba(74,27,12,.08);
}
.log-answer:last-child{ border-bottom:0 }
.log-answer-key{ color:#712B13; opacity:.85 }
.log-answer-val{ color:#4A1B0C; font-weight:500; text-align:right; max-width:60%; word-break:break-word }
.hidden{ display:none }
.log-caret.open{ transform:rotate(90deg) }
</style>

<div class="nav">
  <div class="nav-item" onclick="location.href='/health/home'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg>
  </div>
  <div class="nav-item" id="nav-alys" onclick="location.href='/health/alys'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
    <span class="nav-dot"></span>
  </div>
  <div class="nav-item active">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
  </div>
  <div class="nav-item" onclick="location.href='/health/profile'">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
  </div>
</div>

<script>
const API = 'https://noti-health-api.ancient-bread-01fe.workers.dev';
const token = localStorage.getItem('noti_token');
if (!token) { location.href = '/health/login'; }

let days = 30;

document.querySelectorAll('.range-chip').forEach(chip => {
  chip.onclick = () => {
    days = Number(chip.dataset.days);
    document.querySelectorAll('.range-chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    document.getElementById('title').textContent = `Last ${days} days`;
    load();
  };
});

async function load() {
  try {
    const [meRes, patternsRes, checkinsRes, notesRes] = await Promise.all([
      fetch(API + '/me',                         { headers: { 'Authorization': 'Bearer ' + token }}),
      fetch(API + `/me/patterns?days=${days}`,   { headers: { 'Authorization': 'Bearer ' + token }}),
      fetch(API + `/me/checkins?days=${days}`,   { headers: { 'Authorization': 'Bearer ' + token }}),
      fetch(API + `/me/notes?days=${days}`,      { headers: { 'Authorization': 'Bearer ' + token }})
    ]);
    const me        = await meRes.json();
    const patterns  = await patternsRes.json();
    const checkins  = await checkinsRes.json();
    const notes     = await notesRes.json();

    renderSummary(me, patterns, checkins);
    renderPatterns(patterns);
    renderLogEntries(checkins.checkins || [], notes.notes || []);
    const checkinsCount = (checkins.checkins || []).length;
    const notesCount    = (notes.notes || []).length;
    const totalCount    = checkinsCount + notesCount;
    const label = totalCount === 0
      ? 'No entries in this range yet.'
      : `${checkinsCount} check-in${checkinsCount === 1 ? '' : 's'}` +
        (notesCount > 0 ? ` + ${notesCount} note${notesCount === 1 ? '' : 's'}` : '') +
        ' · tap to expand';
    document.getElementById('log-count').textContent = label;
  } catch (e) {
    document.getElementById('patterns-list').innerHTML =
      `<p class="empty">Couldn't load your record. Try again in a moment.</p>`;
  }
}

// ── Daily log — expandable list (check-ins + notes interleaved) ─
function renderLogEntries(checkinRows, noteRows) {
  const el = document.getElementById('log-entries');
  const all = [];

  // Normalise check-ins
  for (const r of (checkinRows || [])) {
    all.push({
      kind: 'checkin',
      when: r.completed_at || r.started_at,
      slot: r.slot,
      answers: r.answers || {}
    });
  }
  // Normalise notes
  for (const n of (noteRows || [])) {
    all.push({
      kind: 'note',
      when: n.created_at,
      mood: n.mood,
      body: n.body,
      alys_reply: n.alys_reply
    });
  }

  if (!all.length) { el.innerHTML = ''; return; }

  // Newest first
  all.sort((a, b) => new Date(b.when) - new Date(a.when));

  const fmtDate = (iso) => {
    const d = new Date(iso);
    return d.toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
  };
  const fmtTime = (iso) => {
    const d = new Date(iso);
    return d.toLocaleTimeString('en-AU', { hour: 'numeric', minute: '2-digit' });
  };
  const labelKey = (key) => key.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
  const moodEmoji = { good: 'Good', ok: 'OK', rough: 'Rough', bad: 'Bad' };

  el.innerHTML = all.map((r, i) => {
    if (r.kind === 'note') {
      const bodyHTML = [];
      bodyHTML.push(`<div class="log-answer"><span class="log-answer-key">Feeling</span><span class="log-answer-val">${moodEmoji[r.mood] || r.mood}</span></div>`);
      if (r.body) bodyHTML.push(`<div class="log-answer"><span class="log-answer-key">Note</span><span class="log-answer-val">${escapeHtml(r.body)}</span></div>`);
      if (r.alys_reply) bodyHTML.push(`<div class="log-answer" style="flex-direction:column;align-items:flex-start;gap:4px"><span class="log-answer-key">Alys replied</span><span class="log-answer-val" style="max-width:100%;text-align:left">${escapeHtml(r.alys_reply)}</span></div>`);
      return `
        <div class="log-entry" data-idx="${i}">
          <div class="log-entry-header">
            <div>
              <div class="log-entry-date">${fmtDate(r.when)}</div>
              <div class="log-entry-slot">Note (${moodEmoji[r.mood] || r.mood}) · ${fmtTime(r.when)}</div>
            </div>
            <span class="log-entry-caret">▸</span>
          </div>
          <div class="log-entry-body">${bodyHTML.join('')}</div>
        </div>`;
    }
    // Check-in row
    const answers = r.answers || {};
    const keys = Object.keys(answers).filter(k => answers[k] !== null && answers[k] !== '');
    const answersHTML = keys.length === 0
      ? `<p class="log-answer" style="justify-content:center;opacity:.6">No answers recorded</p>`
      : keys.map(k =>
          `<div class="log-answer"><span class="log-answer-key">${labelKey(k)}</span><span class="log-answer-val">${escapeHtml(String(answers[k]))}</span></div>`
        ).join('');
    return `
      <div class="log-entry" data-idx="${i}">
        <div class="log-entry-header">
          <div>
            <div class="log-entry-date">${fmtDate(r.when)}</div>
            <div class="log-entry-slot">${r.slot} check-in · ${fmtTime(r.when)}</div>
          </div>
          <span class="log-entry-caret">▸</span>
        </div>
        <div class="log-entry-body">${answersHTML}</div>
      </div>`;
  }).join('');

  // Wire up expand/collapse for each entry
  el.querySelectorAll('.log-entry').forEach(entry => {
    entry.querySelector('.log-entry-header').onclick = () => {
      entry.classList.toggle('open');
    };
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

// ── Daily log toggle ───────────────────────────
document.getElementById('log-header').onclick = () => {
  const entries = document.getElementById('log-entries');
  const caret   = document.getElementById('log-caret');
  entries.classList.toggle('hidden');
  caret.classList.toggle('open');
};

// Stats shown by default for everyone
const CORE_STATS = [
  { label: 'Check-ins', get: (a, r) => `${r.length} / ${days}` },
  { label: 'Avg sleep', get: (a) => a.sleep != null ? a.sleep.toFixed(1) + ' h'  : '—' },
  { label: 'Avg mood',  get: (a) => a.mood  != null ? a.mood.toFixed(1)  + ' / 10' : '—' }
];

// Stats that only show if the user tracks that template
const TEMPLATE_STATS = {
  migraines: [{
    label: 'Headache days',
    get: (_a, rows) => rows.filter(r =>
      r.slot === 'evening' && r.answers && r.answers.headache != null && Number(r.answers.headache) > 0
    ).length
  }],
  pain: [{
    label: 'Avg pain',
    get: (a) => a.pain != null ? a.pain.toFixed(1) + ' / 10' : '—'
  }],
  fatigue: [{
    label: 'Avg fatigue',
    get: (a) => a.fatigue != null ? a.fatigue.toFixed(1) + ' / 10' : '—'
  }],
  fog: [{
    label: 'Avg brain fog',
    get: (a) => a.fog != null ? a.fog.toFixed(1) + ' / 10' : '—'
  }],
  anxiety: [{
    label: 'Avg anxiety',
    get: (a) => a.anxiety != null ? a.anxiety.toFixed(1) + ' / 10' : '—'
  }],
  weight: [{
    label: 'Latest weight',
    get: (_a, rows) => {
      const latest = rows.find(r => r.answers && r.answers.weight != null);
      return latest ? latest.answers.weight + ' kg' : '—';
    }
  }],
  pots: [{
    label: 'POTS flare days',
    get: (_a, rows) => rows.filter(r =>
      r.slot === 'evening' && r.answers && r.answers.dizzy != null && Number(r.answers.dizzy) >= 6
    ).length
  }]
};

function renderSummary(me, patterns, checkins) {
  const templates = me.templates || [];
  const a = (patterns.patterns && patterns.patterns.averages) || {};
  const rows = checkins.checkins || [];

  const stats = [...CORE_STATS];
  for (const t of templates) {
    if (TEMPLATE_STATS[t]) stats.push(...TEMPLATE_STATS[t]);
  }
  // Cap at 6 stats so the grid doesn't overflow
  const capped = stats.slice(0, 6);

  const grid = document.getElementById('summary-grid');
  grid.innerHTML = capped.map(s =>
    `<div class="stat"><p>${s.label}</p><p>${s.get(a, rows)}</p></div>`
  ).join('');
}

function renderPatterns(patterns) {
  const el = document.getElementById('patterns-list');
  const p = patterns.patterns || {};
  const lines = [];

  // Derived sentences from the pattern engine output
  for (const c of (p.comparisons || [])) {
    if (c.label === 'sleep_vs_headache' && c.low_sleep_avg_headache != null) {
      lines.push(`Headaches were heavier on nights under 6 hours of sleep (avg ${c.low_sleep_avg_headache} vs ${c.better_sleep_avg_headache}).`);
    }
    if (c.label === 'morning_vs_evening_mood') {
      lines.push(`Evening mood was higher than morning mood on ${c.evening_higher_on} of ${c.of_paired_days} paired days.`);
    }
    if (c.label === 'hydration_vs_headache' && c.rows && c.rows.length) {
      const low = c.rows.find(r => r.choice === 'low');
      const good = c.rows.find(r => r.choice === 'good');
      if (low && good) lines.push(`Headaches ran higher on low-hydration days (avg ${low.avg_headache}) than good-hydration days (avg ${good.avg_headache}).`);
    }
  }

  if (p.top_triggers && p.top_triggers.length) {
    const top = p.top_triggers.slice(0,3).map(t => `${t.trigger} (${t.count})`).join(', ');
    lines.push(`Top self-reported triggers: ${top}.`);
  }

  if (!lines.length) {
    el.innerHTML = `<p class="empty">Building up a picture. Check back after a few more check-ins.</p>`;
    return;
  }
  el.innerHTML = lines.map(l => `<p class="pattern">${escape(l)}</p>`).join('');
}

function escape(s) {
  return String(s || '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

load();
</script>
<script src="/health/push-client.js">
// ── Unread indicator on Alys nav ───────────────
async function checkUnread() {
  try {
    const res = await fetch(API + '/me/unread-count', { headers: { 'Authorization': 'Bearer ' + token }});
    const data = await res.json();
    const navAlys = document.getElementById('nav-alys');
    if (navAlys) navAlys.classList.toggle('has-unread', data.unread > 0);
  } catch (e) { /* silent */ }
}
checkUnread();

</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Request a Tradie — noti.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:  #0C0C0C; --white: #FFFFFF; --off: #F5F5F3;
      --line:   #E8E8E6; --muted: #999994; --dim: #666663;
      --orange: #F5A623; --green: #0A7A3E; --red: #B52222;
      --font:   'Montserrat', sans-serif;
    }
    body { font-family: var(--font); background: transparent; color: var(--black); -webkit-font-smoothing: antialiased; }
    .wrap { max-width: 520px; }

    .hdr { padding-bottom: 14px; }
    .hdr-kick { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--orange); margin-bottom: 5px; display: flex; align-items: center; gap: 6px; }
    .hdr-kick::before { content: ''; width: 4px; height: 4px; border-radius: 50%; background: var(--orange); flex-shrink: 0; }
    .hdr-title { font-size: 22px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.15; margin-bottom: 4px; }
    .hdr-sub { font-size: 12px; font-weight: 500; color: var(--muted); }

    .card { background: var(--white); border: 1px solid var(--line); padding: 20px; }

    .type-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
    .type-opt { border: 1.5px solid var(--line); padding: 10px 12px; cursor: pointer; transition: all 0.12s; }
    .type-opt input { display: none; }
    .type-opt.sel { border-color: var(--orange); background: #FEF6E9; }
    .type-name { font-size: 13px; font-weight: 700; }
    .type-desc { font-size: 10px; font-weight: 500; color: var(--muted); margin-top: 1px; }

    .divider { height: 1px; background: var(--line); margin: 0 -20px 14px; }

    .field { margin-bottom: 12px; }
    .field:last-of-type { margin-bottom: 0; }
    .lbl { display: block; font-size: 10px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); margin-bottom: 5px; }
    input, select, textarea {
      width: 100%; background: transparent; border: none;
      border-bottom: 1.5px solid var(--line); padding: 7px 0;
      font: inherit; font-size: 14px; font-weight: 500; color: var(--black);
      outline: none; border-radius: 0; -webkit-appearance: none;
    }
    input:focus, select:focus, textarea:focus { border-bottom-color: var(--black); }
    textarea { min-height: 68px; resize: none; line-height: 1.5; }
    .g2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    .photo-zone {
      border: 1.5px dashed var(--line); background: var(--off); padding: 10px 14px;
      display: flex; align-items: center; gap: 10px; cursor: pointer;
      position: relative; margin-top: 5px; transition: border-color 0.15s;
    }
    .photo-zone:hover { border-color: var(--orange); }
    .photo-zone.has { border-color: var(--green); border-style: solid; background: #F0FAF4; }
    .photo-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; border: none; padding: 0; }
    .photo-lbl { font-size: 12px; font-weight: 600; color: var(--dim); }
    .photo-sub { font-size: 10px; color: var(--muted); }

    .btn {
      display: block; width: 100%; padding: 14px; background: var(--orange);
      color: var(--black); border: none; border-radius: 0; font: inherit;
      font-size: 14px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase;
      cursor: pointer; margin-top: 16px; transition: opacity 0.15s;
    }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn:hover:not(:disabled) { opacity: 0.88; }

    .notice { padding: 10px 14px; font-size: 12px; font-weight: 600; line-height: 1.5; border-left: 3px solid var(--muted); background: var(--off); color: var(--dim); margin-top: 10px; }
    .notice.ok  { border-left-color: var(--green); color: var(--green); background: #F0FAF4; }
    .notice.err { border-left-color: var(--red);   color: var(--red);   background: #FDF0F0; }

    .foot { font-size: 10px; font-weight: 500; color: var(--muted); margin-top: 10px; line-height: 1.5; }

    @media (max-width: 400px) {
      .type-row { grid-template-columns: 1fr; }
      .g2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="wrap">

  <div class="hdr">
    <div class="hdr-kick">Get a tradie</div>
    <div class="hdr-title">Tell us what you need</div>
    <div class="hdr-sub">We will connect you with local tradies fast.</div>
  </div>

  <div class="card">

    <div class="type-row">
      <label class="type-opt sel" id="opt-urgent">
        <input type="radio" name="jobType" value="JOB" checked />
        <div class="type-name">Urgent repair</div>
        <div class="type-desc">Something needs fixing now</div>
      </label>
      <label class="type-opt" id="opt-quote">
        <input type="radio" name="jobType" value="QUOTE" />
        <div class="type-name">Quote or inspection</div>
        <div class="type-desc">I want prices first</div>
      </label>
    </div>

    <div class="divider"></div>

    <div class="field">
      <label class="lbl">What is the job?</label>
      <textarea id="description" placeholder="e.g. Leaking tap under the kitchen sink"></textarea>
    </div>

    <div class="field g2">
      <div>
        <label class="lbl">Suburb</label>
        <input type="text" id="suburb" />
      </div>
      <div>
        <label class="lbl">Postcode</label>
        <input type="text" id="postcode" inputmode="numeric" maxlength="4" />
      </div>
    </div>

    <div class="field">
      <label class="lbl">Photo (optional)</label>
      <div class="photo-zone" id="photoZone">
        <input type="file" id="photoFile" accept="image/*" />
        <span style="font-size:18px;flex-shrink:0;">📷</span>
        <div>
          <div class="photo-lbl" id="photoLbl">Tap to add a photo</div>
          <div class="photo-sub" id="photoSub">Helps tradies understand the job</div>
        </div>
      </div>
    </div>

    <div class="divider"></div>

    <div class="field g2">
      <div>
        <label class="lbl">Your name</label>
        <input type="text" id="name" />
      </div>
      <div>
        <label class="lbl">Mobile</label>
        <input type="tel" id="phone" />
      </div>
    </div>

    <button class="btn" id="submitBtn">Find specialists</button>
    <div id="notice"></div>
  </div>

  <div class="foot">By submitting you agree to receive SMS updates about your job.</div>

</div>
<script>
const API = "https://noti-api.ancient-bread-01fe.workers.dev";

document.querySelectorAll('.type-opt').forEach(function(opt){
  opt.addEventListener('click', function(){
    document.querySelectorAll('.type-opt').forEach(function(o){ o.classList.remove('sel'); });
    opt.classList.add('sel');
    opt.querySelector('input').checked = true;
  });
});

var photoInput = document.getElementById('photoFile');
photoInput.addEventListener('change', function(){
  var file = photoInput.files[0];
  if (!file) return;
  document.getElementById('photoZone').classList.add('has');
  document.getElementById('photoLbl').textContent = file.name;
  document.getElementById('photoSub').textContent = '';
});

function val(id){ return (document.getElementById(id).value||'').trim(); }
function cleanPhone(p){ return p.replace(/\s+/g,'').replace(/[^0-9]/g,''); }
function fileToBase64(file){ return new Promise(function(res,rej){ var r=new FileReader(); r.onload=function(){ res(r.result); }; r.onerror=rej; r.readAsDataURL(file); }); }
function note(msg,type){ var el=document.getElementById('notice'); el.className='notice '+type; el.textContent=msg; }

document.getElementById('submitBtn').addEventListener('click', async function(){
  var btn = document.getElementById('submitBtn');
  if (!val('description')) { note('Please describe the job.','err'); return; }
  if (!val('suburb'))      { note('Please enter your suburb.','err'); return; }
  if (!val('name'))        { note('Please enter your name.','err'); return; }
  if (!val('phone'))       { note('Please enter your mobile number.','err'); return; }

  btn.disabled=true; btn.textContent='Finding tradies...';
  document.getElementById('notice').className=''; document.getElementById('notice').textContent='';

  try {
    var photoB64='', photoMime='', pf=photoInput.files[0];
    if (pf){ var pd=await fileToBase64(pf); photoB64=pd.split(',')[1]; photoMime=pf.type||'image/jpeg'; }

    var res = await fetch(API, {
      method:'POST', headers:{'Content-Type':'application/json'},
      // POST to /job/new
    var res = await fetch(API + '/job/new', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ phone:cleanPhone(val('phone')), name:val('name'),
        description:val('description'), suburb:val('suburb'), postcode:val('postcode'),
        job_type:document.querySelector('.type-opt.sel input').value,
        photo:photoB64, photoMime:photoMime
      })
    });
    var data = JSON.parse(await res.text());
    if (!data.success){ note(data.message||'Something went wrong. Please try again.','err'); btn.disabled=false; btn.textContent='Find specialists'; return; }
    window.location.href = '/job/' + data.jobId + '/' + data.token;
  } catch(e){
    note('Something went wrong. Please try again.','err'); btn.disabled=false; btn.textContent='Find specialists';
  }
});
</script>
</body>
</html>

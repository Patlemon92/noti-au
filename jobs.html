<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Noti Job</title>
  <style>
    :root {
      --bg: #f5f4f0;
      --card: #ffffff;
      --border: #e4e1d8;
      --text: #181818;
      --muted: #6a6a6a;
      --orange: #fb8a00;
      --orange-soft: #fff4e7;
      --black: #111111;
      --green-soft: #eef8ef;
      --green: #176b2c;
      --red-soft: #fff1f1;
      --red: #a81f1f;
      --shadow: 0 12px 30px rgba(0,0,0,0.06);
      --radius: 18px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: var(--bg);
      color: var(--text);
      padding: 16px;
    }

    .wrap {
      max-width: 920px;
      margin: 0 auto;
    }

    .hero {
      background: linear-gradient(135deg, #111111 0%, #1f1f1f 100%);
      color: #fff;
      border-radius: 22px;
      padding: 24px;
      box-shadow: var(--shadow);
      margin-bottom: 16px;
    }

    .hero .eyebrow {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(251,138,0,0.16);
      color: #ffb04d;
      border: 1px solid rgba(251,138,0,0.28);
      margin-bottom: 14px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 30px;
      line-height: 1.05;
    }

    .hero p {
      margin: 0;
      color: rgba(255,255,255,0.84);
      line-height: 1.5;
      font-size: 14px;
    }

    .stack { display: grid; gap: 16px; }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .card-body { padding: 20px; }

    .card h2 {
      margin: 0 0 8px;
      font-size: 21px;
      color: var(--black);
    }

    .subtext {
      margin: 0;
      font-size: 14px;
      line-height: 1.5;
      color: var(--muted);
    }

    .status-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    .pill.orange {
      background: var(--orange-soft);
      border-color: #ffd9a7;
      color: #9a5500;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .grid-3 {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .field.full { grid-column: 1 / -1; }

    label {
      font-size: 14px;
      font-weight: 700;
      color: var(--black);
    }

    input, textarea, button {
      font: inherit;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      color: var(--text);
      outline: none;
    }

    input:focus, textarea:focus {
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(251,138,0,0.14);
    }

    textarea {
      min-height: 110px;
      resize: vertical;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 16px;
    }

    button {
      border: 0;
      border-radius: 14px;
      padding: 15px 18px;
      cursor: pointer;
      font-weight: 700;
      transition: transform 0.15s ease, opacity 0.2s ease;
    }

    button:hover { transform: translateY(-1px); }
    button:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    .btn-primary {
      background: var(--orange);
      color: #fff;
    }

    .btn-secondary {
      background: #fff;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .notice {
      padding: 14px 16px;
      border-radius: 14px;
      font-size: 14px;
      line-height: 1.5;
      border: 1px solid var(--border);
      background: #faf9f6;
    }

    .notice.success {
      background: var(--green-soft);
      border-color: #cde6d1;
      color: var(--green);
    }

    .notice.error {
      background: var(--red-soft);
      border-color: #f0c8c8;
      color: var(--red);
    }

    .offer-card, .summary-card {
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      background: #fff;
    }

    .offer-card h3, .summary-card h3 {
      margin: 0 0 8px;
      font-size: 18px;
    }

    .meta {
      display: grid;
      gap: 8px;
      font-size: 14px;
      color: var(--text);
    }

    .meta .muted { color: var(--muted); }

    .loading {
      display: grid;
      place-items: center;
      min-height: 240px;
      color: var(--muted);
      font-size: 15px;
    }

    .spinner {
      width: 34px;
      height: 34px;
      border-radius: 999px;
      border: 3px solid #ece8de;
      border-top-color: var(--orange);
      animation: spin 0.9s linear infinite;
      margin-bottom: 14px;
    }

    .footer-note {
      margin-top: 8px;
      font-size: 12px;
      color: var(--muted);
      text-align: center;
    }

    .hidden { display: none; }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 760px) {
      .grid, .grid-3 {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="eyebrow">Noti Job</div>
      <h1 id="heroTitle">Loading job...</h1>
      <p id="heroText">Please wait while we load your job details.</p>
      <div class="status-bar" id="heroPills"></div>
    </div>

    <div id="app" class="stack">
      <div class="card">
        <div class="loading">
          <div>
            <div class="spinner"></div>
            Loading your Noti job...
          </div>
        </div>
      </div>
    </div>

    <div class="footer-note">Powered by Noti</div>
  </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbwqJ99QUqKPLwvejodDYqpz-0F2740qYAkiwHrP3h_aNHoDKcUTUIGvsRrDb1H17cTR/exec";

const app = document.getElementById("app");
const heroTitle = document.getElementById("heroTitle");
const heroText = document.getElementById("heroText");
const heroPills = document.getElementById("heroPills");

// =========================
// URL PARSING (FIXED)
// =========================
const params = new URLSearchParams(window.location.search);
const pathParts = window.location.pathname.split("/").filter(Boolean);

let jobId = "";

// 1. Normal: /job/J123
if (pathParts.length >= 2 && pathParts[0] === "job") {
  jobId = pathParts[1];
}

// 2. Cloudflare fallback (if path got stripped)
if (!jobId && pathParts.length === 1 && pathParts[0].startsWith("J")) {
  jobId = pathParts[0];
}

// 3. Query param (recommended going forward)
if (!jobId) {
  jobId = params.get("jobId");
}

// 4. Legacy fallback
if (!jobId) {
  jobId = params.get("id");
}

const token = params.get("t") || "";

// DEBUG
console.log("PATH:", window.location.pathname);
console.log("JOB ID:", jobId);
console.log("TOKEN:", token);

// =========================
// HELPERS
// =========================
function escapeHtml(value) {
  return String(value || "")
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;");
}

function pill(text, extra = "") {
  return `<div class="pill ${extra}">${escapeHtml(text)}</div>`;
}

// =========================
// FETCH JOB (DEBUG ENABLED)
// =========================
async function fetchJob() {

  if (!jobId || !token) {
    renderError("This job link is missing information.");
    return;
  }

  try {

    const url = `${API_URL}?type=get_job&id=${encodeURIComponent(jobId)}&t=${encodeURIComponent(token)}`;

    console.log("FETCH URL:", url);

    const res = await fetch(url);
    const raw = await res.text();

    console.log("RAW RESPONSE:", raw);

    const data = JSON.parse(raw);

    if (!data.success) {
      renderError(data.message || "This job link is invalid.");
      return;
    }

    currentData = data;
    renderPage(data);

  } catch (err) {
    console.error("FETCH ERROR:", err);
    renderError("We could not load this job right now.");
  }
}

// =========================
// POST ACTION
// =========================
async function postAction(payload) {

  const query = new URLSearchParams({
    type: "frontend_action",
    jobId: jobId,
    t: token,
    ...payload
  }).toString();

  const url = `${API_URL}?${query}`;

  console.log("ACTION URL:", url);

  const res = await fetch(url);
  const text = await res.text();

  console.log("ACTION RESPONSE:", text);

  return JSON.parse(text);
}

// =========================
// HERO
// =========================
function setHero(data) {

  const role = data.role === "tradie" ? "Tradie" : "Customer";

  heroTitle.textContent = data.job.description || "Job";
  heroText.textContent = `${role} view for ${data.job.suburb || "your area"}.`;

  heroPills.innerHTML = [
    pill(data.role.toUpperCase()),
    pill(data.job.job_type || "STANDARD", "orange"),
    pill(data.stage || "LIVE")
  ].join("");
}

// =========================
// ERROR UI
// =========================
function renderError(message) {

  heroTitle.textContent = "Job unavailable";
  heroText.textContent = "This link may be invalid or expired.";
  heroPills.innerHTML = "";

  app.innerHTML = `
    <div class="card">
      <div class="card-body">
        <div class="notice error">${escapeHtml(message)}</div>
      </div>
    </div>
  `;
}

// =========================
// PAGE ROUTER
// =========================
function renderPage(data) {

  setHero(data);

  if (data.role === "tradie_locked") {
    app.innerHTML = `
      <div class="card">
        <div class="card-body">
          <h2>Job already taken</h2>
          <p class="subtext">This job has already been locked in by another tradie.</p>
        </div>
      </div>
    `;
    return;
  }

  if (data.role === "tradie") {
    renderTradieView(data);
    return;
  }

  renderCustomerView(data);
}

// =========================
// CUSTOMER VIEW
// =========================
function renderCustomerView(data) {

  const job = data.job || {};
  const tradie = data.tradie || null;

  const showOffer = !!job.price || !!job.eta;
  const accepted = String(data.stage || "").toUpperCase() === "ACCEPTED";

  app.innerHTML = `
    <div class="card">
      <div class="card-body">
        <h2>Your job</h2>

        <div class="grid" style="margin-top:16px;">
          <div class="field full">
            <label>Description</label>
            <textarea id="cDescription">${escapeHtml(job.description || "")}</textarea>
          </div>

          <div class="field">
            <label>Suburb</label>
            <input id="cSuburb" value="${escapeHtml(job.suburb || "")}" />
          </div>

          <div class="field">
            <label>Postcode</label>
            <input id="cPostcode" value="${escapeHtml(job.postcode || "")}" />
          </div>

          <div class="field full">
            <label>Address</label>
            <input id="cAddress" value="${escapeHtml(job.address || "")}" />
          </div>
        </div>

        <div class="actions">
          <button class="btn-primary" id="submitBtn">Confirm job</button>
        </div>
      </div>
    </div>

    ${showOffer ? `
      <div class="card">
        <div class="card-body">
          <h2>Tradie response</h2>

          <div class="offer-card">
            <h3>${escapeHtml(tradie ? tradie.name : "Tradie")}</h3>
            <div>ETA: ${escapeHtml(job.eta || "ASAP")}</div>
            <div>Price: ${escapeHtml(job.price ? "$" + job.price : "TBC")}</div>

            <div class="actions">
              <button class="btn-primary" id="acceptBtn">Accept</button>
            </div>
          </div>
        </div>
      </div>
    ` : ""}

    ${accepted && tradie ? `
      <div class="card">
        <div class="card-body">
          <h2>Tradie confirmed</h2>
          <div>${escapeHtml(tradie.name)}</div>
          <div>${escapeHtml(tradie.phone)}</div>
        </div>
      </div>
    ` : ""}
  `;

  // Submit job
  const submitBtn = document.getElementById("submitBtn");
  if (submitBtn) {
    submitBtn.onclick = async () => {
      await postAction({
        action: "update_job",
        description: document.getElementById("cDescription").value,
        suburb: document.getElementById("cSuburb").value,
        postcode: document.getElementById("cPostcode").value,
        address: document.getElementById("cAddress").value
      });

      await postAction({ action: "submit_job" });

      fetchJob();
    };
  }

  // Accept tradie
  const acceptBtn = document.getElementById("acceptBtn");
  if (acceptBtn) {
    acceptBtn.onclick = async () => {
      await postAction({ action: "accept" });
      fetchJob();
    };
  }
}

// =========================
// TRADIE VIEW
// =========================
function renderTradieView(data) {

  const job = data.job || {};

  app.innerHTML = `
    <div class="card">
      <div class="card-body">
        <h2>${escapeHtml(job.description)}</h2>

        <div>Suburb: ${escapeHtml(job.suburb)}</div>
        <div>Postcode: ${escapeHtml(job.postcode)}</div>

        <div class="actions">
          <button class="btn-primary" id="acceptBtn">Accept job</button>
        </div>

        <div style="margin-top:20px;">
          <input id="eta" placeholder="ETA">
          <input id="price" placeholder="Price">

          <button id="quoteBtn">Send</button>
        </div>
      </div>
    </div>
  `;

  document.getElementById("acceptBtn").onclick = async () => {
    await postAction({ action: "accept" });
    fetchJob();
  };

  document.getElementById("quoteBtn").onclick = async () => {
    await postAction({
      action: "quote",
      eta: document.getElementById("eta").value,
      price: document.getElementById("price").value
    });
    fetchJob();
  };
}

// =========================
// INIT
// =========================
fetchJob();
</script>
</body>
</html>

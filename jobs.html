<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0f172a" />
<title>noti.</title>

<style>
  /* ══════════════════════════════════════════════════════════════
     FIELDOPS TOKENS — applied to Noti
     Keeping Noti's orange as the brand accent (per the guide note
     "Noti is orange by convention") and emerald for confirmed states.
     Slate provides the structural/neutral system.
     ══════════════════════════════════════════════════════════════ */
  :root {
    /* Neutrals — FieldOps slate scale */
    --slate-900: #0f172a;
    --slate-700: #334155;
    --slate-500: #64748b;
    --slate-400: #94a3b8;
    --slate-200: #e2e8f0;
    --slate-100: #f1f5f9;
    --slate-50:  #f8fafc;

    /* Semantic families */
    --blue-600:     #2563eb;
    --emerald-600:  #059669;
    --emerald-500:  #10b981;
    --emerald-50:   #ecfdf5;
    --emerald-200:  #a7f3d0;
    --amber-100:    #fef3c7;
    --amber-600:    #d97706;
    --amber-200:    #fde68a;
    --red-600:      #dc2626;
    --red-50:       #fef2f2;
    --red-200:      #fecaca;

    /* Brand */
    --noti:         #ea580c;
    --noti-light:   #fff7ed;

    /* Semantic shorthand (used throughout) */
    --bg:           var(--slate-50);
    --surface:      #ffffff;
    --text:         var(--slate-900);
    --muted:        var(--slate-500);
    --line:         var(--slate-200);
    --line-soft:    var(--slate-100);

    /* Radius scale */
    --r-md:  6px;
    --r-lg:  8px;
    --r-xl:  12px;
    --r-2xl: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    color: var(--text);
    background: var(--bg);
    font-variant-numeric: tabular-nums;
    font-size: 14px;
    line-height: 1.5;
  }

  body {
    min-height: 100vh;
    min-height: 100dvh;
    padding-bottom: env(safe-area-inset-bottom);
  }

  /* ── TOPBAR ───────────────────────────────────────────────── */
  .topbar {
    position: sticky; top: 0; z-index: 50;
    padding: 12px 16px;
    padding-top: max(12px, env(safe-area-inset-top));
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    display: flex; justify-content: space-between; align-items: center;
  }
  .brand {
    font-size: 20px; font-weight: 700; letter-spacing: -0.03em;
    color: var(--text);
  }
  .brand .dot { color: var(--noti); }
  .topbar-tag {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted);
  }

  /* ── PAGE CONTAINER ──────────────────────────────────────── */
  .page { padding: 0 0 40px; }

  /* ── HERO ────────────────────────────────────────────────── */
  .hero {
    padding: 20px 16px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--line);
  }
  .hero-kicker {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
  .hero-title {
    font-size: 22px; font-weight: 600;
    letter-spacing: -0.02em; color: var(--text);
    line-height: 1.25;
    margin-bottom: 4px;
  }
  .hero-sub {
    font-size: 13px; color: var(--muted); font-weight: 500;
  }
  .hero-status {
    margin-top: 12px;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: var(--r-md);
    background: var(--slate-100);
    font-size: 11px; font-weight: 600; color: var(--slate-700);
  }
  .status-dot {
    width: 6px; height: 6px; border-radius: 50%; background: var(--slate-400);
  }
  .status-dot.pulse { background: var(--noti); animation: pulse 1.4s ease-in-out infinite; }
  .status-dot.moving { background: var(--amber-600); }
  .status-dot.live   { background: var(--noti); }
  .status-dot.done   { background: var(--emerald-600); }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50%      { opacity: 0.4; transform: scale(1.3); }
  }

  /* ── SECTIONS (cards) ────────────────────────────────────── */
  .section {
    background: var(--surface);
    margin: 12px 16px;
    border: 1px solid var(--line);
    border-radius: var(--r-xl);
    padding: 16px;
  }
  .section-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 12px;
  }

  /* ── FIELDS ──────────────────────────────────────────────── */
  .field { margin-bottom: 14px; }
  .field:last-child { margin-bottom: 0; }
  .field-row { display: grid; grid-template-columns: 2fr 1fr; gap: 10px; }
  .field-label {
    display: block;
    font-size: 12px; font-weight: 500;
    color: var(--slate-700);
    margin-bottom: 6px;
  }
  input, textarea {
    width: 100%;
    padding: 11px 12px;
    font-family: inherit;
    font-size: 14px; font-weight: 500;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    transition: border-color 0.15s, box-shadow 0.15s;
    -webkit-appearance: none;
    appearance: none;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: var(--blue-600);
    box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
  }
  input::placeholder, textarea::placeholder { color: var(--slate-400); }
  textarea { resize: vertical; min-height: 80px; line-height: 1.5; }

  /* ── BUTTONS ─────────────────────────────────────────────── */
  .btn-wrap { padding: 4px 16px 16px; }
  .btn {
    width: 100%;
    padding: 14px 18px;
    font-size: 14px; font-weight: 600; font-family: inherit;
    border-radius: var(--r-lg);
    border: 1px solid transparent;
    cursor: pointer;
    transition: transform 0.1s, background 0.15s;
    letter-spacing: -0.01em;
  }
  .btn:active:not(:disabled) { transform: scale(0.98); }
  .btn:disabled { opacity: 0.5; cursor: default; }

  .btn-primary {
    background: var(--slate-900);
    color: #fff;
    border-color: var(--slate-900);
  }
  .btn-primary:hover:not(:disabled) { background: #000; }

  .btn-brand {
    background: var(--noti);
    color: #fff;
    border-color: var(--noti);
  }
  .btn-brand:hover:not(:disabled) { background: #c2410c; }

  .btn-secondary {
    background: var(--surface);
    color: var(--text);
    border-color: var(--line);
  }
  .btn-secondary:hover:not(:disabled) { border-color: var(--slate-400); }

  /* keep legacy .btn-black alias for any legacy reference */
  .btn-black { @apply: none; background: var(--slate-900); color: #fff; border-color: var(--slate-900); }

  /* ── DATA LIST (key / value pairs) ────────────────────────── */
  .data-list { }
  .data-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 10px 0; border-top: 1px solid var(--line-soft);
    gap: 12px;
  }
  .data-row:first-child { border-top: none; padding-top: 0; }
  .data-row:last-child  { padding-bottom: 0; }
  .data-key {
    font-size: 12px; font-weight: 500; color: var(--muted);
    flex-shrink: 0;
  }
  .data-val {
    font-size: 14px; font-weight: 500; color: var(--text);
    text-align: right;
  }
  .data-val.mono { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 13px; }
  .data-val.big  { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; }

  /* ── NOTICE ──────────────────────────────────────────────── */
  .notice-wrap { padding: 0 16px; }
  .notice {
    padding: 12px 14px;
    font-size: 13px; line-height: 1.5; font-weight: 500;
    border-radius: var(--r-lg);
    border: 1px solid transparent;
    margin-bottom: 12px;
  }
  .notice.hi  { background: var(--noti-light); color: #9a3412; border-color: #fed7aa; }
  .notice.ok  { background: var(--emerald-50); color: #065f46; border-color: var(--emerald-200); }
  .notice.err { background: var(--red-50); color: #991b1b; border-color: var(--red-200); }

  /* ── WAITING BLOCK ───────────────────────────────────────── */
  .waiting-block {
    margin: 12px 16px;
    padding: 32px 24px;
    background: var(--surface);
    border: 1px solid var(--line);
    border-radius: var(--r-xl);
    text-align: center;
  }
  .waiting-icon {
    width: 56px; height: 56px;
    margin: 0 auto 16px;
    background: var(--slate-100);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  .waiting-icon-dot {
    width: 14px; height: 14px; border-radius: 50%;
    background: var(--noti);
    animation: pulse 1.4s ease-in-out infinite;
  }
  .waiting-icon::before {
    content: ''; position: absolute;
    inset: -6px;
    border-radius: 50%;
    border: 2px solid var(--noti);
    opacity: 0.2;
    animation: ripple 1.8s ease-out infinite;
  }
  @keyframes ripple {
    0%   { transform: scale(0.8); opacity: 0.4; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  .waiting-title {
    font-size: 17px; font-weight: 600;
    color: var(--text); letter-spacing: -0.01em;
    margin-bottom: 6px;
  }
  .waiting-sub {
    font-size: 13px; color: var(--muted); line-height: 1.55;
  }

  /* ── TIMER (countdown) ───────────────────────────────────── */
  .timer {
    margin: 12px 16px;
    padding: 14px 16px;
    background: var(--slate-900);
    color: #fff;
    border-radius: var(--r-xl);
    display: flex; justify-content: space-between; align-items: center;
    gap: 16px;
  }
  .timer-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--slate-400);
  }
  .timer-sub {
    font-size: 11px; color: var(--slate-400); margin-top: 2px;
  }
  .timer-val {
    font-size: 24px; font-weight: 600;
    letter-spacing: -0.02em; color: var(--noti);
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
  }
  .timer-val.expired { color: var(--slate-500); }
  .timer-val.urgent  { color: #fca5a5; }

  /* Cohesive inline version (big countdown inside waiting card) */
  .big-countdown {
    margin-top: 20px;
    padding-top: 20px;
    border-top: 1px solid var(--line-soft);
  }
  .big-countdown-label {
    font-size: 10px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--muted); margin-bottom: 6px;
  }
  .big-countdown-val {
    font-size: 36px; font-weight: 600;
    letter-spacing: -0.03em; color: var(--noti);
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
  }

  /* ── PHOTO UPLOAD ────────────────────────────────────────── */
  .photo-hint {
    font-size: 12px; color: var(--muted); font-weight: 500;
    margin-top: 8px;
  }
  .photo-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px;
  }
  .photo-slot {
    aspect-ratio: 1;
    background: var(--slate-50);
    border: 1.5px dashed var(--line);
    border-radius: var(--r-lg);
    position: relative;
    overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    transition: border-color 0.15s;
  }
  .photo-slot:hover { border-color: var(--slate-400); }
  .photo-slot.has-photo { border-style: solid; border-color: var(--line); }
  .photo-slot.uploading::after {
    content: 'Uploading…'; position: absolute; inset: 0;
    background: rgba(15, 23, 42, 0.7); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 500;
  }
  .photo-slot svg { color: var(--slate-400); width: 22px; height: 22px; }
  .photo-slot img {
    position: absolute; inset: 0;
    width: 100%; height: 100%; object-fit: cover;
  }
  .photo-input {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
  }
  .photo-input:disabled { cursor: not-allowed; }
  .job-photos {
    margin-top: 12px;
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
  }
  .job-photo {
    width: 100%; aspect-ratio: 1; object-fit: cover;
    border-radius: var(--r-lg); border: 1px solid var(--line);
  }

  /* ── QUOTE / OFFER CARDS ─────────────────────────────────── */
  .quote-list { display: flex; flex-direction: column; gap: 10px; }
  .quote-item {
    padding: 14px;
    border: 1px solid var(--line);
    border-radius: var(--r-xl);
    background: var(--surface);
    transition: border-color 0.15s;
  }
  .quote-item:hover { border-color: var(--slate-400); }
  .quote-item.premium {
    border-color: var(--noti);
    background: var(--noti-light);
  }

  .quote-header {
    display: grid; grid-template-columns: auto 1fr auto;
    gap: 12px; align-items: start;
  }
  .quote-initial {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: var(--slate-100);
    color: var(--slate-700);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
    letter-spacing: 0.02em; flex-shrink: 0;
  }
  .quote-item.premium .quote-initial {
    background: var(--noti); color: #fff;
  }
  .quote-info { min-width: 0; }
  .quote-name {
    font-size: 14px; font-weight: 600;
    color: var(--text); letter-spacing: -0.01em;
    margin-bottom: 2px;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .quote-name .pro-tag {
    display: inline-block; margin-left: 6px;
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.06em; text-transform: uppercase;
    background: var(--noti); color: #fff;
    padding: 2px 6px; border-radius: var(--r-md);
    vertical-align: 1px;
  }
  .quote-eta {
    font-size: 12px; color: var(--muted); font-weight: 500;
    margin-bottom: 2px;
  }
  .quote-rating { color: var(--amber-600); font-weight: 600; }
  .quote-price {
    font-size: 18px; font-weight: 600;
    letter-spacing: -0.02em; color: var(--text);
    text-align: right; white-space: nowrap;
  }
  .quote-call {
    display: inline-flex; align-items: center; gap: 4px;
    margin-top: 6px;
    font-size: 14px; font-weight: 600;
    color: var(--noti); text-decoration: none;
    padding: 6px 10px; background: var(--noti-light);
    border-radius: var(--r-md);
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
  }

  /* ── TRADIE BLOCK (accepted confirmation) ────────────────── */
  .tradie-block {
    display: grid; grid-template-columns: auto 1fr;
    gap: 14px; align-items: center;
    padding: 14px;
    background: var(--emerald-50);
    border: 1px solid var(--emerald-200);
    border-radius: var(--r-xl);
    margin-bottom: 14px;
  }
  .tradie-initial {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--emerald-600); color: #fff;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; font-weight: 600;
  }
  .tradie-name { font-size: 16px; font-weight: 600; letter-spacing: -0.01em; color: var(--text); }
  .tradie-meta { font-size: 12px; color: var(--muted); font-weight: 500; margin-top: 2px; }
  .tradie-phone {
    margin-top: 4px;
    font-size: 14px; font-weight: 600;
    color: var(--emerald-600);
    font-family: ui-monospace, 'SF Mono', Menlo, monospace;
    text-decoration: none;
  }

  /* ── STARS (review) ──────────────────────────────────────── */
  .star-row {
    display: flex; gap: 6px; justify-content: center;
    padding: 8px 0 16px;
  }
  .star {
    background: none; border: none;
    font-size: 30px; line-height: 1;
    color: var(--slate-200); cursor: pointer;
    transition: color 0.15s, transform 0.1s;
    padding: 6px;
  }
  .star:hover { transform: scale(1.1); }
  .star:active { transform: scale(0.95); }
  .star.on { color: var(--amber-600); }

  /* ── ANIMATIONS ──────────────────────────────────────────── */
  .animate { opacity: 0; transform: translateY(6px); animation: in 0.4s ease-out forwards; }
  .d1 { animation-delay: 0.06s; }
  .d2 { animation-delay: 0.12s; }
  .d3 { animation-delay: 0.18s; }
  @keyframes in {
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── FOOTER ──────────────────────────────────────────────── */
  .footer {
    text-align: center;
    font-size: 18px; font-weight: 700;
    letter-spacing: -0.03em;
    color: var(--slate-200);
    margin-top: 40px;
  }
  .footer em { color: var(--noti); font-style: normal; }
  .support-link {
    text-align: center; padding: 10px 0 0;
    font-size: 12px; font-weight: 500; color: var(--muted);
  }
  .support-link a { color: var(--muted); text-decoration: none; }

  /* ── RESPONSIVE ──────────────────────────────────────────── */
  @media (min-width: 560px) {
    body { background: var(--slate-100); }
    .topbar, .page { max-width: 480px; margin-left: auto; margin-right: auto; }
    .topbar, .hero, .section, .waiting-block, .timer, .notice-wrap, .btn-wrap {
      max-width: 480px; margin-left: auto; margin-right: auto;
    }
    .page {
      min-height: 100vh; background: var(--surface);
      box-shadow: 0 0 0 1px var(--line), 0 10px 40px rgba(15, 23, 42, 0.06);
    }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">noti<span class="dot">.</span></div>
  <div class="topbar-tag" id="topTag"></div>
</div>

<div class="page" id="page">
  <div class="waiting-block">
    <div class="waiting-icon"><div class="waiting-icon-dot"></div></div>
    <div class="waiting-title">Loading</div>
    <div class="waiting-sub">Just a moment…</div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const API = "https://noti-api.ancient-bread-01fe.workers.dev";
let _data = null;

// ─── URL PARSING ──────────────────────────────────────────
const params = new URLSearchParams(location.search);
const jobId  = params.get("jobId");
const token  = params.get("t");
const tag    = document.getElementById("topTag");

if (!jobId || !token) {
  err("Invalid link. Please check your SMS.");
  throw new Error("Missing params");
}

// ─── HELPERS ──────────────────────────────────────────────
function esc(s) { return String(s||"").replace(/[&<>"']/g, c => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }
function fmt(s) { return String(s||"").trim(); }
function ini(name) {
  const parts = fmt(name).split(/\s+/).filter(Boolean);
  return (parts[0]?.[0]||"") + (parts[1]?.[0]||"") || "?";
}

// ─── API ──────────────────────────────────────────────────
async function api(payload) {
  const res = await fetch(`${API}/job/action`, {
    method:  "POST",
    headers: { "Content-Type": "application/json" },
    body:    JSON.stringify({ jobId, t:token, ...payload })
  });
  return JSON.parse(await res.text());
}

async function load() {
  try {
    const r = await api({ action:"load" });
    if (!r.success) { err(r.message||"Could not load this job."); return; }
    _data = r;
    route(r);
  } catch(e) { err("Connection issue. Try again in a moment."); }
}

// ─── ROUTER ───────────────────────────────────────────────
function route(d) {
  if (d.role === "tradie_locked")     { showLocked(); return; }
  if (d.role === "specialist")        { showTradie(d); return; }
  showCustomer(d);
}

// ─── STAGE META ───────────────────────────────────────────
function stageMeta(s) {
  const m = {
    NEW:                    ["live",   "Confirm your job"],
    DRAFT:                  ["live",   "Confirm your job"],
    SENT_TO_TRADIES:        ["pulse",  "Finding specialists"],
    AWAITING_CUSTOMER:      ["moving", "Offer ready"],
    AWAITING_TRADIE_DETAILS:["moving", "Specialist responding"],
    ACCEPTED:               ["done",   "Confirmed"],
    CLOSED:                 ["done",   "Complete"],
    QUOTE_OPEN:             ["pulse",  "Quotes open"],
    QUOTE_LOCKED:           ["done",   "Quotes ready"],
  };
  return m[s] || ["", s || "Live"];
}

function heroHtml(eyebrow, title, sub, stage) {
  const [dotCls, stageLabel] = stageMeta(stage);
  tag.textContent = stageLabel;
  return `
    <div class="hero animate">
      <div class="hero-kicker">${esc(eyebrow)}</div>
      <div class="hero-title">${esc(title)}</div>
      ${sub ? `<div class="hero-sub">${esc(sub)}</div>` : ""}
      <div class="hero-status">
        <div class="status-dot ${dotCls}"></div>
        ${esc(stageLabel)}
      </div>
    </div>`;
}

// ─── CUSTOMER ─────────────────────────────────────────────
function showCustomer(d) {
  const job   = d.job || {};
  const stage = fmt(d.stage).toUpperCase();
  const loc   = [job.suburb, job.postcode].filter(Boolean).join(" · ");

  if (stage === "NEW" || stage === "DRAFT")       return showConfirm(job, loc, d.returning === true);
  if (stage === "AWAITING_CUSTOMER")               return showOfferCards(job, d.quote_cards||[], loc);
  if (stage === "ACCEPTED" || stage === "CLOSED")  return showAccepted(job, d.tradie, d.allow_rating, loc);
  if (stage === "QUOTE_LOCKED")                    return showQuoteCards(job, d.quote_cards||[], loc);
  showWaiting(job, stage, loc);
}

// ── CONFIRM ───────────────────────────────────────────────
function showConfirm(job, loc, returning) {
  render(`
    ${heroHtml(returning ? "Welcome back" : "Confirm your job", job.description||"Your request", loc, "NEW")}
    <div class="section animate d1">
      <div class="section-label">Your details</div>
      <div class="field">
        <label class="field-label">Your name</label>
        <input id="cName" value="${esc(job.name||'')}" placeholder="First and last name" autocomplete="name" />
      </div>
      <div class="field">
        <label class="field-label">What do you need done?</label>
        <textarea id="cDesc" placeholder="Describe the job">${esc(job.description||'')}</textarea>
      </div>
      <div class="field field-row">
        <div>
          <label class="field-label">Suburb</label>
          <input id="cSuburb" value="${esc(job.suburb||'')}" autocomplete="address-level2" />
        </div>
        <div>
          <label class="field-label">Postcode</label>
          <input id="cPostcode" value="${esc(job.postcode||'')}" inputmode="numeric" autocomplete="postal-code" />
        </div>
      </div>
      <div class="field">
        <label class="field-label">Street address</label>
        <input id="cAddr" value="${esc(job.address||'')}" placeholder="42 Smith Street" autocomplete="street-address" />
      </div>
    </div>
    <div class="section animate d2">
      <div class="section-label">Photos <span style="font-weight:500;color:var(--slate-400);text-transform:none;letter-spacing:0;">· Optional</span></div>
      <div class="photo-row" id="photoRow">
        ${[0,1,2].map(i => `
          <div class="photo-slot" id="slot${i}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="12" cy="12" r="3"/></svg>
            <input type="file" class="photo-input" accept="image/*" data-index="${i}" ${i > 0 ? 'disabled' : ''} />
          </div>
        `).join('')}
      </div>
      <div class="photo-hint">Photos help specialists understand the job faster.</div>
    </div>
    <div id="nWrap" class="notice-wrap"></div>
    <div class="btn-wrap animate d3">
      <button class="btn btn-primary" id="submitBtn">Find a specialist</button>
    </div>
  `);

  initPhotoUpload();

  get("submitBtn").onclick = async () => {
    const btn = get("submitBtn"), n = get("nWrap");
    if (!get("cName").value.trim())   { note(n,"Please enter your name.","err"); return; }
    if (!get("cAddr").value.trim())   { note(n,"Please enter your address.","err"); return; }
    if (!get("cSuburb").value.trim()) { note(n,"Please enter your suburb.","err"); return; }
    disable(btn, "Sending…");
    try {
      const r1 = await api({ action:"update_job", name:get("cName").value, description:get("cDesc").value, suburb:get("cSuburb").value, postcode:get("cPostcode").value, address:get("cAddr").value });
      if (!r1.success) { note(n, r1.message||"Update failed", "err"); enable(btn,"Find a specialist"); return; }
      const r2 = await api({ action:"submit_job" });
      if (!r2.success) { note(n, r2.message||"Could not send", "err"); enable(btn,"Find a specialist"); return; }
      btn.textContent = "Sent";
      setTimeout(load, 900);
    } catch(e) { note(n,"Something went wrong.","err"); enable(btn,"Find a specialist"); }
  };
}

// ── WAITING ───────────────────────────────────────────────
function showWaiting(job, stage, loc) {
  const windowMins = job.job_type === "QUOTE" ? 60 : 10;
  const createdAt  = job.created_at ? new Date(job.created_at).getTime() : Date.now();
  const expiresAt  = createdAt + (windowMins * 60 * 1000);
  const secsLeft   = Math.max(0, Math.floor((expiresAt - Date.now()) / 1000));
  const mins       = Math.floor(secsLeft / 60);
  const secs       = String(secsLeft % 60).padStart(2, '0');

  render(`
    ${heroHtml("Your job", job.description||"Your job", loc, stage)}
    <div class="waiting-block animate d1">
      <div class="waiting-icon">
        <div class="waiting-icon-dot"></div>
      </div>
      <div class="waiting-title">Finding specialists nearby</div>
      <div class="waiting-sub">Specialists in your area are being notified.<br>We'll send an SMS as soon as one responds.</div>
      ${secsLeft > 0 ? `
        <div class="big-countdown">
          <div class="big-countdown-label">Responses close in</div>
          <div id="custCountdown" class="big-countdown-val">${mins}:${secs}</div>
        </div>` : ''}
    </div>
  `);

  // Countdown for customer
  if (secsLeft > 0) {
    let s = secsLeft;
    const tick = setInterval(() => {
      s--;
      const el = document.getElementById('custCountdown');
      if (!el) { clearInterval(tick); return; }
      if (s <= 0) { el.textContent = '0:00'; clearInterval(tick); load(); return; }
      el.textContent = Math.floor(s/60) + ':' + String(s%60).padStart(2,'0');
    }, 1000);
  }

  // Auto-refresh every 15 seconds while waiting
  setTimeout(() => { if (_data && _data.stage === stage) load(); }, 15000);
}

// ── OFFER CARDS — JOB type ────────────────────────────────
// Customer sees all responding specialists as cards and picks one
function showOfferCards(job, cards, loc) {
  const hasCards = cards && cards.length > 0;

  const cardHtml = hasCards ? cards.map((c, i) => {
    const isPremium  = c.premium && c.verified;
    const initials   = ini(c.name);
    const price      = c.price ? `$${parseFloat(c.price).toFixed(2)}` : '—';
    const eta        = c.eta   ? esc(c.eta) : 'ASAP';
    const rating     = c.rating ? `${parseFloat(c.rating).toFixed(1)} ★` : '';

    return `
      <div class="quote-item${isPremium ? ' premium' : ''}">
        <div class="quote-header">
          <div class="quote-initial">${initials}</div>
          <div class="quote-info">
            <div class="quote-name">${esc(c.name)}${isPremium ? '<span class="pro-tag">Verified</span>' : ''}</div>
            ${rating ? `<div class="quote-eta"><span class="quote-rating">${rating}</span></div>` : ''}
            <div class="quote-eta">Can arrive in ${eta}</div>
          </div>
          <div class="quote-price">${price}</div>
        </div>
        <div id="nWrap${i}" style="margin-top:10px;"></div>
        <button class="btn btn-primary" style="margin-top:12px;" onclick="acceptTradie('${esc(c.tradie_id)}',${i})">Choose ${esc(c.name.split(' ')[0] || 'specialist')}</button>
      </div>`;
  }).join('') : `
    <div class="waiting-block" style="margin:0;">
      <div class="waiting-icon"><div class="waiting-icon-dot"></div></div>
      <div class="waiting-title">Waiting for offers</div>
      <div class="waiting-sub">Specialists are reviewing your job.<br>This page will update automatically.</div>
    </div>`;

  render(`
    ${heroHtml("Your job", job.description||"Your job", loc, "AWAITING_CUSTOMER")}
    <div class="section animate d1">
      ${hasCards ? `<div class="section-label">${cards.length} offer${cards.length !== 1 ? 's' : ''} — pick one</div>` : ''}
      <div class="quote-list">${cardHtml}</div>
    </div>
    <div id="nWrap" class="notice-wrap"></div>
  `);

  if (!hasCards) setTimeout(() => load(), 10000);
}

window.acceptTradie = async function(tradieId, idx) {
  const btns = document.querySelectorAll('.quote-item .btn');
  const btn  = btns[idx];
  const n    = get('nWrap' + idx) || get('nWrap');
  btns.forEach(b => b.disabled = true);
  if (btn) btn.textContent = 'Confirming…';
  try {
    const r = await api({ action:'accept', tradie_id: tradieId });
    if (!r.success) {
      btns.forEach((b, i) => {
        b.disabled = false;
      });
      if (btn) btn.textContent = 'Choose this specialist';
      note(n, r.message || 'Something went wrong.', 'err');
      return;
    }
    setTimeout(load, 600);
  } catch(e) {
    btns.forEach(b => b.disabled = false);
    if (btn) btn.textContent = 'Choose this specialist';
    note(n, 'Something went wrong.', 'err');
  }
};

// ── QUOTE CARDS — QUOTE type ──────────────────────────────
// Customer sees all cards with phone numbers and calls directly
function showQuoteCards(job, cards, loc) {
  const list = cards.length ? cards.map(c => {
    const isPremium = c.premium && c.verified;
    return `
      <div class="quote-item${isPremium ? ' premium' : ''}">
        <div class="quote-header">
          <div class="quote-initial">${ini(c.name)}</div>
          <div class="quote-info">
            <div class="quote-name">${esc(c.name)}${isPremium ? '<span class="pro-tag">Verified</span>' : ''}</div>
            ${c.eta   ? `<div class="quote-eta">${esc(c.eta)}</div>` : ''}
            ${c.phone ? `<a class="quote-call" href="tel:${esc(c.phone)}">📞 ${esc(c.phone)}</a>` : ''}
          </div>
          ${c.price ? `<div class="quote-price">$${parseFloat(c.price).toFixed(2)}</div>` : ''}
        </div>
      </div>`;
  }).join('') : `<div class="waiting-block" style="margin:0;"><div class="waiting-title">No quotes yet</div><div class="waiting-sub">We'll keep you updated.</div></div>`;

  render(`
    ${heroHtml("Your quote", job.description||"Your job", loc, "QUOTE_LOCKED")}
    <div class="section animate d1">
      <div class="section-label">${cards.length} specialist${cards.length !== 1 ? 's' : ''} responded</div>
      <div class="quote-list">${list}</div>
    </div>
    <div class="notice-wrap animate d2">
      <div class="notice hi">Call the specialist you prefer to arrange a time.</div>
    </div>
  `);
}

// ── ACCEPTED ──────────────────────────────────────────────
function showAccepted(job, tradie, allowRating, loc) {
  const name  = tradie ? fmt(tradie.name)  : "Your specialist";
  const phone = tradie ? fmt(tradie.phone) : "";

  render(`
    ${heroHtml("Your job", job.description||"Your job", loc, "ACCEPTED")}
    <div class="section animate d1">
      <div class="section-label">Confirmed specialist</div>
      <div class="tradie-block">
        <div class="tradie-initial">${esc(ini(name))}</div>
        <div>
          <div class="tradie-name">${esc(name)}</div>
          ${tradie && tradie.rating ? `<div class="tradie-meta">${parseFloat(tradie.rating).toFixed(1)} ★ rating</div>` : ""}
          ${phone ? `<a class="tradie-phone" href="tel:${esc(phone)}">${esc(phone)}</a>` : ""}
        </div>
      </div>
      ${(job.price || job.eta) ? `
        <div class="data-list">
          ${job.price ? `<div class="data-row"><span class="data-key">Agreed price</span><span class="data-val big">$${parseFloat(job.price).toFixed(2)}</span></div>` : ""}
          ${job.eta   ? `<div class="data-row"><span class="data-key">ETA</span><span class="data-val">${esc(job.eta)}</span></div>` : ""}
        </div>` : ""}
    </div>
    <div class="notice-wrap animate d2">
      <div class="notice hi">Contact your specialist directly to confirm timing.</div>
    </div>
    ${allowRating ? `
      <div class="section animate d3" id="rSection">
        <div class="section-label">How did it go?</div>
        <div class="star-row" id="stars">
          ${[1,2,3,4,5].map(n => `<button class="star" data-v="${n}">★</button>`).join("")}
        </div>
        <div class="field">
          <label class="field-label">Comment <span style="color:var(--slate-400);font-weight:500;">· Optional</span></label>
          <textarea id="rComment" placeholder="Share more about your experience…"></textarea>
        </div>
        <div id="rNotice" style="margin-bottom:12px;"></div>
        <button class="btn btn-primary" id="rateBtn" disabled>Submit review</button>
      </div>` : ""}
  `);

  if (allowRating) wireStars();
}

function wireStars() {
  let sel = 0;
  const stars   = document.querySelectorAll(".star");
  const rateBtn = get("rateBtn");
  stars.forEach(s => s.addEventListener("click", () => {
    sel = parseInt(s.dataset.v);
    stars.forEach(b => b.classList.toggle("on", parseInt(b.dataset.v) <= sel));
    rateBtn.disabled = false;
  }));
  rateBtn.onclick = async () => {
    const n = get("rNotice");
    disable(rateBtn, "Submitting…");
    try {
      const r = await api({ action:"rating", rating:sel, comment:get("rComment").value });
      if (!r.success) { note(n,r.message||"Error","err"); enable(rateBtn,"Submit review"); return; }
      get("rSection").innerHTML = `<div class="notice ok">Thanks for your review — it helps other customers.</div>`;
    } catch(e) { note(n,"Something went wrong.","err"); enable(rateBtn,"Submit review"); }
  };
}

// ─── TRADIE VIEWS ─────────────────────────────────────────
function showTradie(d) {
  const job   = d.job || {};
  const stage = fmt(d.stage).toUpperCase();
  const loc   = [job.suburb, job.postcode].filter(Boolean).join(" · ");

  // Specialist has already submitted their offer — waiting on customer
  if (stage === "AWAITING_CUSTOMER") {
    render(`
      ${heroHtml("Offer sent", job.description||"Job", loc, "AWAITING_CUSTOMER")}
      <div class="waiting-block animate d1">
        <div class="waiting-icon"><div class="waiting-icon-dot"></div></div>
        <div class="waiting-title">Offer sent — waiting on customer</div>
        <div class="waiting-sub">You'll get an SMS either way.</div>
      </div>
    `);
    return;
  }

  // Specialist has won — show customer details with address
  if (stage === "ACCEPTED") {
    const custPhone = job.customer_phone || '';
    const address   = [job.address_unit ? job.address_unit + '/' : '', job.address, job.suburb, job.postcode].filter(Boolean).join(' ');
    render(`
      ${heroHtml("You won this job", job.description||"Job", loc, "ACCEPTED")}
      <div class="section animate d1">
        <div class="section-label">Customer details</div>
        <div class="data-list">
          ${job.customer_name ? `<div class="data-row"><span class="data-key">Name</span><span class="data-val">${esc(job.customer_name)}</span></div>` : ''}
          ${custPhone ? `<div class="data-row"><span class="data-key">Mobile</span><a class="data-val mono" href="tel:${esc(custPhone)}" style="color:var(--noti);text-decoration:none;">${esc(custPhone)}</a></div>` : ''}
          ${address ? `<div class="data-row"><span class="data-key">Address</span><span class="data-val">${esc(address)}</span></div>` : ''}
          ${job.price ? `<div class="data-row"><span class="data-key">Your price</span><span class="data-val big">$${parseFloat(job.price).toFixed(2)}</span></div>` : ''}
          ${job.eta   ? `<div class="data-row"><span class="data-key">ETA quoted</span><span class="data-val">${esc(job.eta)}</span></div>` : ''}
        </div>
      </div>
      <div class="notice-wrap animate d2">
        <div class="notice ok">You're confirmed. Contact the customer to arrange access.</div>
      </div>
    `);
    return;
  }

  // Specialist sees job and submits price + ETA
  const windowMins  = job.job_type === "QUOTE" ? 60 : 10;
  const createdAt   = job.created_at ? new Date(job.created_at).getTime() : Date.now();
  const expiresAt   = createdAt + (windowMins * 60 * 1000);
  const secsLeft    = Math.max(0, Math.floor((expiresAt - Date.now()) / 1000));
  const isExpired   = secsLeft === 0;

  render(`
    ${heroHtml("New job", job.description||"New job", loc, "SENT_TO_TRADIES")}
    ${job.job_type === "JOB" ? `
      <div class="timer animate d1">
        <div>
          <div class="timer-label">${isExpired ? 'Window closed' : 'Time to respond'}</div>
          ${!isExpired ? `<div class="timer-sub">Quote fast to win this job</div>` : ''}
        </div>
        <div id="countdown" class="timer-val ${isExpired ? 'expired' : ''}">
          ${isExpired ? '0:00' : Math.floor(secsLeft/60)+':'+String(secsLeft%60).padStart(2,'0')}
        </div>
      </div>` : ''}
    <div class="section animate d2">
      <div class="section-label">Job details</div>
      <div class="data-list">
        <div class="data-row"><span class="data-key">Location</span><span class="data-val">${esc(loc || 'Not specified')}</span></div>
        <div class="data-row"><span class="data-key">Type</span><span class="data-val">${job.job_type === "QUOTE" ? 'Quote · 60 min window' : 'Job · be quick'}</span></div>
      </div>
      ${job.photo_urls && job.photo_urls.length ? `
        <div class="job-photos">
          ${job.photo_urls.map(u => `<img class="job-photo" src="${esc(u)}" />`).join('')}
        </div>` : ''}
    </div>
    <div class="section animate d3">
      <div class="section-label">Your offer</div>
      <div class="field field-row">
        <div>
          <label class="field-label">Your price ($)</label>
          <input id="tPrice" type="number" inputmode="decimal" placeholder="280" />
        </div>
        <div>
          <label class="field-label">When?</label>
          <input id="tEta" placeholder="30 min" />
        </div>
      </div>
    </div>
    <div id="nWrap" class="notice-wrap"></div>
    <div class="btn-wrap animate d3">
      <button class="btn btn-primary" id="quoteBtn">Send offer to customer</button>
    </div>
  `);

  // Start countdown timer
  if (job.job_type === "JOB" && !isExpired) {
    let secs = secsLeft;
    const tick = setInterval(() => {
      secs--;
      const el = document.getElementById('countdown');
      if (!el) { clearInterval(tick); return; }
      if (secs <= 0) {
        el.textContent = '0:00';
        el.className = 'timer-val expired';
        clearInterval(tick);
        return;
      }
      const mins = Math.floor(secs / 60);
      const s    = String(secs % 60).padStart(2, '0');
      el.textContent = `${mins}:${s}`;
      if (secs <= 120) el.className = 'timer-val urgent';
    }, 1000);
  }

  get("quoteBtn").onclick = async () => {
    const btn   = get("quoteBtn"), n = get("nWrap");
    const price = get("tPrice").value.trim();
    const eta   = get("tEta").value.trim();
    if (!price) { note(n,"Please enter your price.","err"); return; }
    if (!eta)   { note(n,"Please enter when you can be there.","err"); return; }
    disable(btn,"Sending…");
    try {
      const r = await api({ action:"quote", price, eta });
      if (!r.success) { note(n,r.message||"Error","err"); enable(btn,"Send offer to customer"); return; }
      note(n,"Offer sent. We'll text you when the customer responds.","ok");
      btn.textContent = "Offer sent";
      btn.disabled    = true;
    } catch(e) { note(n,"Something went wrong.","err"); enable(btn,"Send offer to customer"); }
  };
}

// ─── LOCKED / ERROR ───────────────────────────────────────
function showLocked() {

  render(`
    <div class="hero animate">
      <div class="hero-kicker">Job status</div>
      <div class="hero-title">This one went to another specialist</div>

    <div class="waiting-block animate d1">

function err(msg) {

  render(`
    <div class="hero animate">

// ─── DOM UTILS ────────────────────────────────────────────
function render(html) {
  document.getElementById("page").innerHTML =
    html +
    `<div class="footer">noti<em>.</em></div>` +
    `<div class="support-link"><a href="/support">Need help? Chat with support</a></div>`;
}

function get(id) { return document.getElementById(id); }

function note(el, msg, type) {
  if (!el) return;
  el.innerHTML = `<div class="notice ${type}">${esc(msg)}</div>`;
}

function disable(btn, label) { btn.disabled = true;  btn.textContent = label; }
function enable(btn, label)  { btn.disabled = false; btn.textContent = label; }

// ─── PHOTO UPLOAD ─────────────────────────────────────────
const uploadedPhotos = {};

function initPhotoUpload() {
  document.querySelectorAll('.photo-input').forEach(input => {
    input.addEventListener('change', async (e) => {
      const file  = e.target.files[0];
      const index = parseInt(input.dataset.index);
      if (!file || !jobId || !token) return;
      const slot = document.getElementById('slot' + index);
      slot.classList.add('uploading');
      try {
        const b64  = await fileToBase64(file);
        const data = b64.split(',')[1];
        const res  = await fetch(`${API}/upload/photo`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ jobId, t:token, index, mimeType:file.type, data })
        });
        const json = JSON.parse(await res.text());
        if (!json.success) { slot.classList.remove('uploading'); return; }
        uploadedPhotos[index] = json.url;
        const img = document.createElement('img');
        img.src   = URL.createObjectURL(file);
        slot.appendChild(img);
        slot.classList.remove('uploading');
        slot.classList.add('has-photo');
        const next = document.getElementById('slot' + (index + 1));
        if (next) next.querySelector('.photo-input').disabled = false;
      } catch(e) { slot.classList.remove('uploading'); }
    });
  });
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

load();
</script>

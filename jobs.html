<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>noti.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black:   #0C0C0C;
      --white:   #FFFFFF;
      --off:     #F5F5F3;
      --line:    #E8E8E6;
      --muted:   #999994;
      --dim:     #666663;
      --orange:  #F5A623;
      --green:   #0A7A3E;
      --red:     #B52222;
      --font:    'Montserrat', sans-serif;
      --ease:    cubic-bezier(0.16, 1, 0.3, 1);
    }

    html {
      font-size: 16px;
      background: var(--white);
    }

    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
      overflow-x: hidden;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: 56px;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .logo {
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.03em;
    }

    .logo em {
      color: var(--orange);
      font-style: normal;
    }

    .topbar-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ─── LAYOUT ─── */
    .shell {
      padding-top: 56px;
      min-height: 100dvh;
    }

    .page {
      max-width: 440px;
      margin: 0 auto;
      padding: 0 0 80px;
    }

    /* ─── JOB HERO ─── */
    .hero {
      padding: 36px 24px 28px;
      border-bottom: 1px solid var(--line);
    }

    .hero-kicker {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hero-kicker::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--orange);
      flex-shrink: 0;
    }

    .hero-title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--black);
      margin-bottom: 8px;
    }

    .hero-sub {
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    .hero-status {
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
      flex-shrink: 0;
    }

    .status-dot.live   { background: #22C55E; }
    .status-dot.moving { background: var(--orange); }
    .status-dot.done   { background: var(--black); }
    .status-dot.pulse  {
      background: var(--orange);
      animation: pulse 1.8s ease infinite;
    }

    .status-label {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      color: var(--dim);
    }

    /* ─── SECTIONS ─── */
    .section {
      padding: 28px 24px;
      border-bottom: 1px solid var(--line);
    }

    .section:last-child {
      border-bottom: none;
    }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* ─── STAT PAIR ─── */
    .stat-pair {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
      margin-bottom: 20px;
    }

    .stat {
      background: var(--white);
      padding: 18px 16px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .stat-val {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.04em;
      color: var(--black);
      line-height: 1;
    }

    .stat-val.unit::after {
      content: attr(data-unit);
      font-size: 14px;
      font-weight: 600;
      letter-spacing: 0;
      color: var(--muted);
      margin-left: 3px;
    }

    /* ─── TRADIE ROW ─── */
    .tradie-block {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .tradie-initial {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--off);
      border: 2px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 700;
      color: var(--black);
      flex-shrink: 0;
      letter-spacing: -0.02em;
    }

    .tradie-name {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--black);
      line-height: 1.2;
    }

    .tradie-meta {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-top: 2px;
    }

    .tradie-phone {
      font-size: 15px;
      font-weight: 700;
      color: var(--orange);
      letter-spacing: 0.01em;
      margin-top: 4px;
    }

    /* ─── DATA LIST ─── */
    .data-list { }

    .data-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 13px 0;
      border-bottom: 1px solid var(--line);
    }

    .data-row:last-child { border-bottom: none; }

    .data-key {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.02em;
    }

    .data-val {
      font-size: 14px;
      font-weight: 700;
      color: var(--black);
      text-align: right;
      letter-spacing: -0.01em;
    }

    /* ─── FIELDS ─── */
    .field {
      margin-bottom: 18px;
    }

    .field:last-child { margin-bottom: 0; }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input,
    .field textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--line);
      padding: 10px 0;
      font: inherit;
      font-size: 16px;
      font-weight: 500;
      color: var(--black);
      outline: none;
      border-radius: 0;
      -webkit-appearance: none;
      transition: border-color 0.2s var(--ease);
    }

    .field input:focus,
    .field textarea:focus {
      border-bottom-color: var(--black);
    }

    .field textarea {
      min-height: 88px;
      resize: none;
      line-height: 1.55;
    }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    /* ─── BUTTONS ─── */
    .btn-wrap {
      padding: 0 24px;
      margin-bottom: 10px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 18px 24px;
      border: none;
      border-radius: 0;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, color 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active   { opacity: 0.75; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-black {
      background: var(--black);
      color: var(--white);
    }

    .btn-black:hover:not(:disabled) { background: #1a1a1a; }

    .btn-outline {
      background: transparent;
      color: var(--black);
      border: 1.5px solid var(--line);
    }

    .btn-outline:hover:not(:disabled) { background: var(--off); }

    .btn-orange {
      background: var(--orange);
      color: var(--black);
    }

    .btn-orange:hover:not(:disabled) { opacity: 0.88; }

    /* ─── NOTICE ─── */
    .notice-wrap {
      padding: 0 24px;
      margin-bottom: 10px;
    }

    .notice {
      padding: 14px 16px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.5;
      letter-spacing: 0.01em;
      border-left: 3px solid var(--muted);
      background: var(--off);
      color: var(--dim);
    }

    .notice.ok  { border-left-color: var(--green); color: var(--green); background: #F0FAF4; }
    .notice.err { border-left-color: var(--red);   color: var(--red);   background: #FDF0F0; }
    .notice.hi  { border-left-color: var(--orange); color: #7A4A00; background: #FEF6E9; }

    /* ─── QUOTE CARDS ─── */
    .quote-list { }

    .quote-item {
      padding: 20px 0;
      border-bottom: 1px solid var(--line);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 14px;
      align-items: start;
    }

    .quote-item:last-child { border-bottom: none; }

    .quote-initial {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--off);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--black);
      flex-shrink: 0;
    }

    .quote-info { }
    .quote-name  { font-size: 15px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; }
    .quote-eta   { font-size: 13px; font-weight: 500; color: var(--muted); margin-top: 3px; }
    .quote-call  { font-size: 13px; font-weight: 700; color: var(--orange); margin-top: 4px; }

    .quote-price {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.03em;
      color: var(--black);
      text-align: right;
      padding-top: 2px;
    }

    /* ─── STARS ─── */
    .star-row {
      display: flex;
      gap: 4px;
      margin-bottom: 18px;
    }

    .star {
      font-size: 32px;
      color: var(--line);
      cursor: pointer;
      border: none;
      background: none;
      padding: 4px 2px;
      transition: color 0.1s;
      -webkit-tap-highlight-color: transparent;
      line-height: 1;
    }

    .star.on { color: var(--orange); }

    /* ─── LOADING ─── */
    .loading-page {
      min-height: 70dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .loader {
      width: 28px;
      height: 28px;
      border: 2px solid var(--line);
      border-top-color: var(--black);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .loading-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ─── WAITING PULSE ─── */
    .waiting-block {
      padding: 40px 24px;
      text-align: center;
    }

    .waiting-icon {
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: var(--off);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .waiting-icon::after {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1.5px solid var(--orange);
      opacity: 0;
      animation: ripple 2s ease infinite;
    }

    .waiting-icon-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: var(--orange);
    }

    .waiting-title {
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .waiting-sub {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      line-height: 1.55;
    }

    /* ─── FOOTER ─── */
    .footer {
      text-align: center;
      padding: 32px 0 16px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--line);
    }

    .footer em {
      color: var(--orange);
      font-style: normal;
    }

    /* ─── ANIMATIONS ─── */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(245,166,35,0.4); }
      50%       { box-shadow: 0 0 0 8px rgba(245,166,35,0); }
    }

    @keyframes ripple {
      0%   { transform: scale(0.85); opacity: 0.6; }
      100% { transform: scale(1.6);  opacity: 0; }
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .animate { animation: up 0.45s var(--ease) both; }
    .d1 { animation-delay: 0.05s; }
    .d2 { animation-delay: 0.10s; }
    .d3 { animation-delay: 0.15s; }
    .d4 { animation-delay: 0.20s; }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .page { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
    }

    /* ─── PHOTO UPLOAD ─── */
    .photo-section { margin-top: 20px; }
    .photo-row { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }

    .photo-slot {
      width: 80px; height: 80px;
      border: 1.5px dashed var(--line);
      border-radius: 0;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; position: relative; overflow: hidden;
      background: var(--off);
      transition: border-color 0.15s;
      flex-shrink: 0;
    }

    .photo-slot:hover { border-color: var(--orange); }

    .photo-slot input[type=file] {
      position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
    }

    .photo-slot img {
      width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0;
    }

    .photo-slot .photo-plus {
      font-size: 22px; color: var(--muted); line-height: 1; pointer-events: none;
    }

    .photo-slot .photo-remove {
      position: absolute; top: 2px; right: 2px;
      width: 18px; height: 18px;
      background: var(--black); color: var(--white);
      border-radius: 50%; border: none; cursor: pointer;
      font-size: 10px; font-weight: 700;
      display: none; align-items: center; justify-content: center;
      z-index: 10; padding: 0;
    }

    .photo-slot.has-photo .photo-remove { display: flex; }
    .photo-slot.has-photo .photo-plus   { display: none; }
    .photo-slot.uploading { border-color: var(--orange); }

    .photo-hint {
      font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
      color: var(--muted); margin-top: 8px;
    }

    /* ─── TRADIE PHOTOS ─── */
    .job-photos { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 12px; }
    .job-photo {
      width: 72px; height: 72px; border-radius: 0;
      object-fit: cover; border: 1px solid var(--line);
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">noti<em>.</em></div>
  <div class="topbar-tag" id="topTag"></div>
</div>

<div class="shell">
  <div class="page" id="page">
    <div class="loading-page">
      <div class="loader"></div>
      <div class="loading-label">Loading</div>
    </div>
  </div>
</div>

<script>
// ─── CONFIG ───────────────────────────────────────────────
const API = "https://noti-api.ancient-bread-01fe.workers.dev";

// ─── URL PARSING ──────────────────────────────────────────
// Cloudflare rewrites /job/JN10001/token → /jobs.html?jobId=JN10001&t=token
// So we always read from query string. Path parsing kept as fallback only.
const QS    = new URLSearchParams(location.search);
const parts = location.pathname.split("/").filter(Boolean);

let jobId = QS.get("jobId") || QS.get("id") || "";
let token = QS.get("t") || "";

// Path fallback (direct access without Cloudflare rewrite)
if (!jobId && parts[0] === "job") { jobId = parts[1] || ""; token = parts[2] || ""; }

let _data = null;

// ─── HELPERS ──────────────────────────────────────────────
const esc = v => String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const fmt = v => String(v||"").trim();
const ini = n => (n||"?").trim().split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);
const tag = document.getElementById("topTag");

// ─── API ──────────────────────────────────────────────────
async function api(payload) {
  const r = await fetch(`${API}/job/action`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ jobId, token, t: token, ...payload })
  });
  return JSON.parse(await r.text());
}

async function load() {
  if (!jobId || !token) { err("This link is missing information."); return; }
  try {
    const r    = await fetch(`${API}/job/${encodeURIComponent(jobId)}/${encodeURIComponent(token)}`);
    const data = JSON.parse(await r.text());
    if (!data.success) { err(data.message || "This link is invalid or expired."); return; }
    _data = data;
    route(data);
  } catch(e) { err("Could not load this job. Please try again."); }
}

// ─── ROUTER ───────────────────────────────────────────────
function route(d) {
  if (d.role === "tradie_locked") { showLocked(); return; }
  if (d.role === "tradie")        { showTradie(d); return; }
  showCustomer(d);
}

// ─── STAGE META ───────────────────────────────────────────
function stageMeta(s) {
  const m = {
    NEW:                    ["live",   "Confirm your job"],
    DRAFT:                  ["live",   "Confirm your job"],
    SENT_TO_TRADIES:        ["pulse",  "Finding tradies"],
    AWAITING_CUSTOMER:      ["moving", "Offer ready"],
    AWAITING_TRADIE_DETAILS:["moving", "Tradie responding"],
    ACCEPTED:               ["done",   "Confirmed"],
    CLOSED:                 ["done",   "Complete"],
    QUOTE_OPEN:             ["pulse",  "Quotes open"],
    QUOTE_LOCKED:           ["done",   "Quotes ready"],
  };
  return m[s] || ["", s || "Live"];
}

function heroHtml(eyebrow, title, sub, stage) {
  const [dotCls, stageLabel] = stageMeta(stage);
  tag.textContent = stageLabel;
  return `
    <div class="hero animate">
      <div class="hero-kicker">${esc(eyebrow)}</div>
      <div class="hero-title">${esc(title)}</div>
      ${sub ? `<div class="hero-sub">${esc(sub)}</div>` : ""}
      <div class="hero-status">
        <div class="status-dot ${dotCls}"></div>
        <div class="status-label">${esc(stageLabel)}</div>
      </div>
    </div>`;
}

// ─── CUSTOMER ─────────────────────────────────────────────
function showCustomer(d) {
  const job   = d.job || {};
  const stage = fmt(d.stage).toUpperCase();
  const loc   = [job.suburb, job.postcode].filter(Boolean).join(" · ");

  if (stage === "NEW" || stage === "DRAFT")       return showConfirm(job, loc, d.returning === true);
  if (stage === "AWAITING_CUSTOMER")               return showOffer(job, d.tradie, loc);
  if (stage === "ACCEPTED" || stage === "CLOSED")  return showAccepted(job, d.tradie, d.allow_rating, loc);
  if (stage === "QUOTE_LOCKED")                    return showQuotes(job, d.quote_cards||[], loc);
  showWaiting(job, stage, loc);
}

// Confirm
function showConfirm(job, loc, returning) {
  render(`
    ${heroHtml("Your job", job.description || "New job", loc, "NEW")}
    <div class="section animate d1">
      ${returning ? '<div class="notice hi" style="margin-bottom:16px;border-left:3px solid var(--orange);padding:12px 14px;background:#FEF6E9;color:#7A4A00;font-size:13px;font-weight:600;">Your details are pre-filled from last time</div>' : ""}
      <div class="section-label">Confirm details</div>
      <div class="field">
        <label class="field-label">Description</label>
        <textarea id="cDesc">${esc(job.description||"")}</textarea>
      </div>
      <div class="field-row">
        <div class="field">
          <label class="field-label">Suburb</label>
          <input id="cSuburb" value="${esc(job.suburb||"")}" />
        </div>
        <div class="field">
          <label class="field-label">Postcode</label>
          <input id="cPostcode" value="${esc(job.postcode||"")}" />
        </div>
      </div>
      <div class="field">
        <label class="field-label">Address</label>
        <input id="cAddr" value="${esc(job.address||"")}" placeholder="Optional" />
      </div>
    </div>
    <div id="nWrap" class="notice-wrap"></div>
    <div class="btn-wrap animate d2">
      <button class="btn btn-black" id="submitBtn">Find tradies</button>
    </div>
  `);

  if (document.getElementById('photoRow')) initPhotoUpload();

  get("submitBtn").onclick = async () => {
    const btn = get("submitBtn"), n = get("nWrap");
    disable(btn, "Sending...");
    try {
      const r1 = await api({ action:"update_job", description:get("cDesc").value, suburb:get("cSuburb").value, postcode:get("cPostcode").value, address:get("cAddr").value });
      if (!r1.success) { note(n, r1.message||"Update failed", "err"); enable(btn,"Find tradies"); return; }
      const r2 = await api({ action:"submit_job" });
      if (!r2.success) { note(n, r2.message||"Could not send", "err"); enable(btn,"Find tradies"); return; }
      btn.textContent = "Sent";
      setTimeout(load, 900);

// Accepted
function showAccepted(job, tradie, allowRating, loc) {
  const name  = tradie ? fmt(tradie.name)  : "Your tradie";
  const phone = tradie ? fmt(tradie.phone) : "";

  render(`
    ${heroHtml("Your job", job.description||"Your job", loc, "ACCEPTED")}
    <div class="section animate d1">
      <div class="section-label">Confirmed tradie</div>
      <div class="tradie-block">
        <div class="tradie-initial">${esc(ini(name))}</div>
        <div>
          <div class="tradie-name">${esc(name)}</div>
          ${tradie&&tradie.rating ? `<div class="tradie-meta">${esc(String(tradie.rating))} ★ &nbsp;·&nbsp; ${esc(String(tradie.jobs_completed))} jobs</div>` : ""}
          ${phone ? `<div class="tradie-phone">${esc(phone)}</div>` : ""}
        </div>
      </div>
      ${(job.price||job.eta) ? `
        <div class="data-list">
          ${job.price ? `<div class="data-row"><span class="data-key">Agreed price</span><span class="data-val" style="font-size:20px;letter-spacing:-0.03em;">$${esc(String(job.price))}</span></div>` : ""}
          ${job.eta   ? `<div class="data-row"><span class="data-key">ETA</span><span class="data-val">${esc(job.eta)}</span></div>` : ""}
        </div>` : ""}
    </div>
    <div class="notice-wrap animate d2">
      <div class="notice hi">Contact your tradie directly to confirm timing and access.</div>
    </div>
    ${allowRating ? `
      <div class="section animate d3" id="rSection">
        <div class="section-label">Rate your tradie</div>
        <div class="star-row" id="stars">
          ${[1,2,3,4,5].map(n=>`<button class="star" data-v="${n}">★</button>`).join("")}
        </div>
        <div class="field">
          <label class="field-label">Comment</label>
          <textarea id="rComment" placeholder="Optional"></textarea>
        </div>
        <div id="rNotice" style="margin-bottom:12px;"></div>
        <button class="btn btn-black" id="rateBtn" disabled>Submit review</button>
      </div>` : ""}
  `);

  if (allowRating) wireStars();
}

function wireStars() {
  let sel = 0;
  const stars   = document.querySelectorAll(".star");
  const rateBtn = get("rateBtn");
  stars.forEach(s => s.addEventListener("click", () => {
    sel = parseInt(s.dataset.v);
    stars.forEach(b => b.classList.toggle("on", parseInt(b.dataset.v) <= sel));
    rateBtn.disabled = false;
  }));
  rateBtn.onclick = async () => {
    const n = get("rNotice");
    disable(rateBtn, "Submitting...");
    try {
      const r = await api({action:"rating", rating:sel, comment:get("rComment").value});
      if (!r.success) { note(n,r.message||"Error","err"); enable(rateBtn,"Submit review"); return; }
      get("rSection").innerHTML = `<div class="notice ok">Thanks for your review.</div>`;
    } catch(e) { note(n,"Something went wrong.","err"); enable(rateBtn,"Submit review"); }
  };
}

// ─── TRADIE ───────────────────────────────────────────────
function showTradie(d) {

  const stage = fmt(d.stage).toUpperCase();
  const loc   = [job.suburb, job.postcode].filter(Boolean).join(" · ");

  if (stage === "AWAITING_CUSTOMER") {

        <div class="waiting-title">Offer sent</div>
        <div class="waiting-sub">Waiting for the customer to respond.<br>You'll get an SMS either way.</div>
      </div>

  }

  render(`
    ${heroHtml("New job", job.description||"New job", loc, "SENT_TO_TRADIES")}
    <div class="section animate d1">

      <div class="data-list">

        ${job.job_type==="QUOTE" ? `<div class="data-row"><span class="data-key">Type</span><span class="data-val">Quote · 1 hr window</span></div>` : ""}
      </div>
    </div>
    <div class="section animate d2">
      <div class="section-label">Your offer</div>
      <div class="field">
        <label class="field-label">Price ($)</label>
        <input id="tPrice" type="number" inputmode="decimal" placeholder="e.g. 280" />
      </div>
      <div class="field">
        <label class="field-label">ETA</label>
        <input id="tEta" placeholder="e.g. 30 min  ·  Tomorrow 2pm" />
      </div>
    </div>
    <div id="nWrap" class="notice-wrap"></div>
    <div class="btn-wrap animate d3">
      <button class="btn btn-black" id="quoteBtn">Send offer to customer</button>
    </div>
  `);

// ─── DOM UTILS ────────────────────────────────────────────
function render(html) {
  document.getElementById("page").innerHTML =
    html + `<div class="footer">noti<em>.</em></div>`;
}

function get(id) { return document.getElementById(id); }

function note(el, msg, type) {

}

function disable(btn, label) {

}

function enable(btn, label) {
  btn.disabled = false;
  btn.textContent = label;
}

// ─── INIT ─────────────────────────────────────────────────

// ─── PHOTO UPLOAD ──────────────────────────────────────────
const uploadedPhotos = {}; // index → url

function initPhotoUpload() {
  document.querySelectorAll('.photo-input').forEach(input => {
    input.addEventListener('change', async (e) => {
      const file  = e.target.files[0];
      const index = parseInt(input.dataset.index);
      if (!file || !jobId || !token) return;

      const slot = document.getElementById('slot' + index);
      slot.classList.add('uploading');

      try {
        const b64  = await fileToBase64(file);
        const data = b64.split(',')[1];

        const res  = await fetch(API, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({
            type:     'upload_photo',
            jobId:    jobId,
            t:        token,
            index:    index,
            mimeType: file.type,
            data:     data
          })
        });
        const json = JSON.parse(await res.text());

        if (!json.success) {
          alert(json.message || 'Upload failed');
          slot.classList.remove('uploading');
          return;
        }

        uploadedPhotos[index] = json.url;

        // Show preview
        const img = document.createElement('img');
        img.src   = URL.createObjectURL(file);
        slot.appendChild(img);
        slot.classList.remove('uploading');
        slot.classList.add('has-photo');

        // Enable next slot
        const next = document.getElementById('slot' + (index + 1));
        if (next) next.querySelector('.photo-input').disabled = false;

      } catch(err) {
        slot.classList.remove('uploading');
        alert('Upload failed. Please try again.');
      }
    });
  });

  document.querySelectorAll('.photo-remove').forEach(btn => {
    btn.addEventListener('click', async (e) => {
      e.stopPropagation();
      const index = parseInt(btn.dataset.index);
      const slot  = document.getElementById('slot' + index);
      const url   = uploadedPhotos[index];

      if (url) {
        await api({ action: 'delete_photo', url: url });
        delete uploadedPhotos[index];
      }

      const img = slot.querySelector('img');
      if (img) img.remove();
      slot.classList.remove('has-photo');

      const input = slot.querySelector('.photo-input');
      input.value = '';

      // Disable subsequent slots
      for (let i = index + 1; i <= 3; i++) {
        const s = document.getElementById('slot' + i);
        if (s) {
          s.querySelector('.photo-input').disabled = true;
          s.classList.remove('has-photo');
          const si = s.querySelector('img');
          if (si) si.remove();
        }
      }
    });
  });
}

function fileToBase64(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload  = () => resolve(reader.result);
    reader.onerror = reject;
    reader.readAsDataURL(file);
  });
}

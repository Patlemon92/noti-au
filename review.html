<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>noti. — review</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --black:   #0C0C0C;
      --white:   #FFFFFF;
      --off:     #F5F5F3;
      --line:    #E8E8E6;
      --muted:   #999994;
      --dim:     #666663;
      --orange:  #F5A623;
      --green:   #0A7A3E;
      --red:     #B52222;
      --font:    'Montserrat', sans-serif;
      --ease:    cubic-bezier(0.16, 1, 0.3, 1);
    }

    html { font-size: 16px; background: var(--white); }

    body {
      font-family: var(--font);
      background: var(--white);
      color: var(--black);
      -webkit-font-smoothing: antialiased;
      min-height: 100dvh;
    }

    /* ─── TOPBAR ─── */
    .topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 200;
      height: 56px;
      background: var(--black);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
    }

    .logo {
      font-size: 18px;
      font-weight: 800;
      color: var(--white);
      letter-spacing: -0.03em;
    }

    .logo em {
      color: var(--orange);
      font-style: normal;
    }

    .topbar-tag {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ─── LAYOUT ─── */
    .shell { padding-top: 56px; min-height: 100dvh; }

    .page {
      max-width: 440px;
      margin: 0 auto;
      padding: 0 0 80px;
    }

    /* ─── HERO ─── */
    .hero {
      padding: 36px 24px 28px;
      border-bottom: 1px solid var(--line);
    }

    .hero-kicker {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .hero-kicker::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--orange);
      flex-shrink: 0;
    }

    .hero-title {
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.15;
      color: var(--black);
      margin-bottom: 6px;
    }

    .hero-sub {
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
    }

    /* ─── SECTIONS ─── */
    .section {
      padding: 28px 24px;
      border-bottom: 1px solid var(--line);
    }

    .section:last-child { border-bottom: none; }

    .section-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* ─── TRADIE BLOCK ─── */
    .tradie-block {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 4px;
    }

    .tradie-initial {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: var(--off);
      border: 2px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 17px;
      font-weight: 700;
      color: var(--black);
      flex-shrink: 0;
      letter-spacing: -0.02em;
    }

    .tradie-name {
      font-size: 19px;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--black);
    }

    .tradie-job {
      font-size: 13px;
      font-weight: 500;
      color: var(--muted);
      margin-top: 3px;
    }

    /* ─── STAR RATING ─── */
    .star-row {
      display: flex;
      gap: 8px;
      margin-bottom: 6px;
    }

    .star {
      width: 52px;
      height: 52px;
      border: 1.5px solid var(--line);
      background: var(--off);
      border-radius: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      cursor: pointer;
      color: var(--muted);
      transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
      font-family: var(--font);
      font-weight: 700;
    }

    .star:active { transform: scale(0.93); }

    .star.on {
      background: var(--orange);
      border-color: var(--orange);
      color: var(--black);
    }

    .star-hint {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--muted);
      margin-top: 10px;
      min-height: 18px;
      transition: color 0.15s;
    }

    /* ─── FIELD ─── */
    .field { margin-bottom: 18px; }
    .field:last-child { margin-bottom: 0; }

    .field-label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field textarea {
      width: 100%;
      background: transparent;
      border: none;
      border-bottom: 1.5px solid var(--line);
      padding: 10px 0;
      font: inherit;
      font-size: 15px;
      font-weight: 500;
      color: var(--black);
      outline: none;
      resize: none;
      line-height: 1.55;
      min-height: 80px;
      transition: border-color 0.2s var(--ease);
      -webkit-appearance: none;
    }

    .field textarea:focus { border-bottom-color: var(--black); }

    /* ─── BUTTONS ─── */
    .btn-wrap {
      padding: 0 24px;
      margin-bottom: 10px;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 18px 24px;
      border: none;
      border-radius: 0;
      font: inherit;
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      cursor: pointer;
      text-align: center;
      transition: background 0.15s, opacity 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active   { opacity: 0.75; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .btn-black {
      background: var(--black);
      color: var(--white);
    }

    .btn-black:hover:not(:disabled) { background: #1a1a1a; }

    /* ─── NOTICE ─── */
    .notice-wrap {
      padding: 0 24px;
      margin-bottom: 10px;
    }

    .notice {
      padding: 14px 16px;
      font-size: 13px;
      font-weight: 600;
      line-height: 1.5;
      letter-spacing: 0.01em;
      border-left: 3px solid var(--muted);
      background: var(--off);
      color: var(--dim);
    }

    .notice.ok  { border-left-color: var(--green); color: var(--green); background: #F0FAF4; }
    .notice.err { border-left-color: var(--red);   color: var(--red);   background: #FDF0F0; }

    /* ─── LOADING ─── */
    .loading-page {
      min-height: 70dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .loader {
      width: 28px;
      height: 28px;
      border: 2px solid var(--line);
      border-top-color: var(--black);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    .loading-label {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
    }

    /* ─── DONE STATE ─── */
    .done-block {
      padding: 56px 24px;
      text-align: center;
    }

    .done-mark {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--off);
      border: 2px solid var(--line);
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 28px;
    }

    .done-title {
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .done-sub {
      font-size: 14px;
      font-weight: 500;
      color: var(--muted);
      line-height: 1.55;
    }

    /* ─── FOOTER ─── */
    .footer {
      text-align: center;
      padding: 32px 0 16px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--line);
    }

    .footer em { color: var(--orange); font-style: normal; }

    /* ─── ANIMATIONS ─── */
    @keyframes spin { to { transform: rotate(360deg); } }

    @keyframes up {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .animate { animation: up 0.45s cubic-bezier(0.16,1,0.3,1) both; }
    .d1 { animation-delay: 0.05s; }
    .d2 { animation-delay: 0.10s; }
    .d3 { animation-delay: 0.15s; }

    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .page { padding-bottom: calc(80px + env(safe-area-inset-bottom)); }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="logo">noti<em>.</em></div>
  <div class="topbar-tag">Review</div>
</div>

<div class="shell">
  <div class="page" id="page">
    <div class="loading-page">
      <div class="loader"></div>
      <div class="loading-label">Loading</div>
    </div>
  </div>
</div>

<script>
const API = "https://noti-api.ancient-bread-01fe.workers.dev";

// URL parsing — works with /review/JN10001?t=xxx
// Cloudflare rewrites /review/JN10001/token → /review.html?jobId=JN10001&t=token
const QS    = new URLSearchParams(location.search);
const parts = location.pathname.split("/").filter(Boolean);

let jobId = QS.get("jobId") || QS.get("id") || "";
let token = QS.get("t") || "";

// Path fallback
if (!jobId && parts[0] === "review") { jobId = parts[1] || ""; token = parts[2] || ""; }

const esc = v => String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
const fmt = v => String(v||"").trim();
const ini = n => (n||"?").trim().split(" ").map(w=>w[0]).join("").toUpperCase().slice(0,2);

const HINTS = ["","Terrible","Poor","Okay","Good","Excellent"];

let sel       = 0;
let jobData   = null;

// ─── LOAD ─────────────────────────────────────────────────
async function load() {
  if (!jobId || !token) { showError("This review link is missing information."); return; }
  try {
    const r    = await fetch(`${API}?type=get_job&id=${encodeURIComponent(jobId)}&t=${encodeURIComponent(token)}`);
    const data = JSON.parse(await r.text());
    if (!data.success) { showError(data.message || "This review link is invalid or expired."); return; }
    jobData = data;
    showForm(data);
  } catch(e) {
    showError("Could not load this review. Please try again.");
  }
}

// ─── FORM ─────────────────────────────────────────────────
function showForm(data) {
  const job    = data.job    || {};
  const tradie = data.tradie || null;
  const name   = tradie ? fmt(tradie.name) : "Your tradie";
  const desc   = fmt(job.description) || "Your job";
  const loc    = [job.suburb, job.postcode].filter(Boolean).join(" · ");

  render(`
    <div class="hero animate">
      <div class="hero-kicker">Job review</div>
      <div class="hero-title">${esc(desc)}</div>
      ${loc ? `<div class="hero-sub">${esc(loc)}</div>` : ""}
    </div>

    <div class="section animate d1">
      <div class="section-label">Tradie</div>
      <div class="tradie-block">
        <div class="tradie-initial">${esc(ini(name))}</div>
        <div>
          <div class="tradie-name">${esc(name)}</div>
          <div class="tradie-job">${esc(desc)}</div>
        </div>
      </div>
    </div>

    <div class="section animate d2">
      <div class="section-label">Rating</div>
      <div class="star-row" id="stars">
        ${[1,2,3,4,5].map(n => `<button class="star" data-v="${n}">★</button>`).join("")}
      </div>
      <div class="star-hint" id="hint">Tap to rate</div>
    </div>

    <div class="section animate d3">
      <div class="section-label">Comment</div>
      <div class="field">
        <textarea id="comment" placeholder="Anything you'd like to mention? (optional)"></textarea>
      </div>
    </div>

    <div id="nWrap" class="notice-wrap"></div>

    <div class="btn-wrap animate d3">
      <button class="btn btn-black" id="submitBtn" disabled>Submit review</button>
    </div>
  `);

  // Wire stars
  const stars   = document.querySelectorAll(".star");
  const hint    = document.getElementById("hint");
  const submitBtn = document.getElementById("submitBtn");

  stars.forEach(s => {
    s.addEventListener("click", () => {
      sel = parseInt(s.dataset.v);
      stars.forEach(b => b.classList.toggle("on", parseInt(b.dataset.v) <= sel));
      hint.textContent = HINTS[sel] || "";
      submitBtn.disabled = false;
    });
  });

  // Submit
  submitBtn.onclick = async () => {
    const n = document.getElementById("nWrap");
    if (!sel) { note(n, "Please choose a rating first.", "err"); return; }
    submitBtn.disabled    = true;
    submitBtn.textContent = "Submitting...";
    try {
      const qs = new URLSearchParams({
        type:    "frontend_action",
        jobId:   jobId,
        t:       token,
        action:  "rating",
        rating:  sel,
        comment: document.getElementById("comment").value
      });
      const r    = await fetch(`${API}?${qs}`);
      const data = JSON.parse(await r.text());
      if (!data.success) throw new Error(data.message || "Could not submit.");
      showDone(name);
    } catch(e) {
      note(document.getElementById("nWrap"), e.message || "Something went wrong.", "err");
      submitBtn.disabled    = false;
      submitBtn.textContent = "Submit review";
    }
  };
}

// ─── DONE ─────────────────────────────────────────────────
function showDone(name) {
  render(`
    <div class="done-block animate">
      <div class="done-mark">★</div>
      <div class="done-title">Thanks for the review</div>
      <div class="done-sub">Your feedback helps other customers<br>find great tradies on noti<em style="color:var(--orange);font-style:normal;">.</em></div>
    </div>
  `);
}

// ─── ERROR ────────────────────────────────────────────────
function showError(msg) {
  render(`
    <div class="hero animate">
      <div class="hero-title">Something went wrong</div>
    </div>
    <div class="notice-wrap animate d1">
      <div class="notice err">${esc(msg)}</div>
    </div>
  `);
}

// ─── DOM ──────────────────────────────────────────────────
function render(html) {
  document.getElementById("page").innerHTML =
    html + `<div class="footer">noti<em>.</em></div>`;
}

function note(el, msg, type) {
  el.innerHTML = `<div class="notice ${type}">${esc(msg)}</div>`;
}

load();
</script>
</body>
</html>
